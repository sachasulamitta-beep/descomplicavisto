<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<script src="access.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audiobook — Guia Completo de Assessoria Consular | Descomplica Visto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;0,900;1,500;1,600;1,700&family=Cinzel:wght@500;600;700&family=Hanken+Grotesk:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --navy-950:#040A18;--navy-900:#06112A;--navy-800:#091a3d;--navy-700:#0c2350;
  --gold-50:#FCEFC0;--gold-100:#F7E2A0;--gold-300:#EBC56A;--gold-500:#D6A23E;--gold-700:#A9781F;
  --ink:#ECF2FE;--muted:#9DB0D6;--muted-dim:#6F82A8;--line:rgba(214,162,62,.28);--line-soft:rgba(157,176,214,.14);
  --gold-grad:linear-gradient(174deg,#FCEFC0 0%,#F0CE78 30%,#D6A23E 58%,#A9781F 100%);
  --gold-grad-flat:linear-gradient(180deg,#F4D98A 0%,#D6A23E 60%,#B0801F 100%);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:"Hanken Grotesk",system-ui,sans-serif;background:var(--navy-950);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.65;display:flex;flex-direction:column;}
a{color:inherit;text-decoration:none;}
.gold{background:var(--gold-grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}

/* ===== top bar ===== */
.topbar{position:sticky;top:0;z-index:50;background:rgba(6,17,42,.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--line-soft);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-shrink:0;}
.topbar .brand{font-family:"Playfair Display",serif;font-weight:700;font-size:.96rem;display:flex;flex-direction:column;line-height:1.1;}
.topbar .brand small{font-family:"Cinzel",serif;font-size:.48rem;letter-spacing:.22em;color:var(--gold-300);margin-top:2px;}
.topbar .back{display:flex;align-items:center;gap:6px;font-size:.82rem;color:var(--muted);transition:color .18s;}
.topbar .back:hover{color:var(--gold-100);}

/* ===== main ===== */
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px 60px;
  background:radial-gradient(80% 70% at 50% 10%,rgba(28,79,156,.35),transparent 60%),linear-gradient(180deg,#071435,var(--navy-950));}
.main .tex{position:fixed;inset:0;pointer-events:none;background-image:radial-gradient(rgba(255,255,255,.04) 1px,transparent 1.4px);background-size:24px 24px;
  -webkit-mask-image:radial-gradient(60% 55% at 50% 15%,#000,transparent 75%);mask-image:radial-gradient(60% 55% at 50% 15%,#000,transparent 75%);z-index:0;}

/* ===== card ===== */
.card{position:relative;z-index:2;width:100%;max-width:520px;background:linear-gradient(180deg,rgba(12,35,80,.7),rgba(6,17,42,.8));border:1px solid var(--line);border-radius:26px;padding:40px 36px 36px;box-shadow:0 40px 80px rgba(0,0,0,.6),0 0 40px rgba(214,162,62,.06);}

/* cover art */
.cover-art{width:160px;height:160px;border-radius:20px;margin:0 auto 28px;position:relative;
  background:radial-gradient(80% 80% at 38% 28%,rgba(28,79,156,.5),transparent 60%),linear-gradient(145deg,#0c2350,#040A18);
  border:1px solid rgba(214,162,62,.4);box-shadow:0 24px 48px rgba(0,0,0,.6),0 0 0 1px rgba(214,162,62,.1);
  display:flex;align-items:center;justify-content:center;overflow:hidden;}
.cover-art img{width:88px;height:88px;object-fit:contain;filter:drop-shadow(0 6px 16px rgba(0,0,0,.5));}
.cover-art .waves{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:center;gap:3px;padding:0 20px 14px;opacity:0;transition:opacity .3s;}
.cover-art.playing .waves{opacity:1;}
.cover-art .waves span{display:block;width:3px;border-radius:3px;background:var(--gold-grad-flat);transform-origin:bottom;animation:none;}
.cover-art.playing .waves span{animation:wave var(--d,0.8s) ease-in-out infinite alternate;}
@keyframes wave{0%{height:4px}100%{height:var(--h,22px)}}

/* info */
.info{text-align:center;margin-bottom:28px;}
.info .eyebrow{font-family:"Cinzel",serif;letter-spacing:.28em;font-size:.6rem;color:var(--gold-300);text-transform:uppercase;margin-bottom:8px;}
.info h1{font-family:"Playfair Display",serif;font-weight:800;font-size:1.55rem;line-height:1.12;text-wrap:balance;}
.info h1 em{font-style:italic;}
.info .by{font-size:.84rem;color:var(--muted);margin-top:8px;}
.info .by b{color:var(--gold-100);}

/* progress */
.progress-wrap{margin-bottom:20px;}
.time-row{display:flex;justify-content:space-between;font-family:"Cinzel",serif;font-size:.68rem;color:var(--muted-dim);margin-bottom:7px;letter-spacing:.04em;}
.track{width:100%;height:5px;border-radius:20px;background:rgba(157,176,214,.14);cursor:pointer;position:relative;appearance:none;-webkit-appearance:none;outline:none;border:none;}
.track::-webkit-slider-thumb{appearance:none;-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--gold-grad-flat);cursor:pointer;border:2px solid rgba(255,255,255,.2);box-shadow:0 2px 8px rgba(0,0,0,.4);}
.track::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--gold-grad-flat);cursor:pointer;border:2px solid rgba(255,255,255,.2);box-shadow:0 2px 8px rgba(0,0,0,.4);}
.track{accent-color:var(--gold-500);}

/* controls */
.controls{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:28px;}
.ctrl-btn{background:none;border:none;cursor:pointer;color:var(--muted);transition:color .18s,transform .15s;display:flex;align-items:center;justify-content:center;padding:6px;}
.ctrl-btn:hover{color:var(--gold-100);transform:scale(1.1);}
.ctrl-btn.play-btn{width:58px;height:58px;border-radius:50%;background:var(--gold-grad-flat);color:var(--navy-900);box-shadow:0 10px 26px rgba(214,162,62,.35);transition:transform .18s,box-shadow .18s;}
.ctrl-btn.play-btn:hover{transform:scale(1.06);box-shadow:0 14px 34px rgba(214,162,62,.5);}
.ctrl-btn.play-btn:active{transform:scale(.96);}

/* volume */
.vol-row{display:flex;align-items:center;gap:10px;margin-bottom:24px;}
.vol-row svg{color:var(--muted-dim);flex:none;}
.vol-track{flex:1;height:4px;border-radius:20px;background:rgba(157,176,214,.14);cursor:pointer;appearance:none;-webkit-appearance:none;outline:none;border:none;accent-color:var(--gold-500);}
.vol-track::-webkit-slider-thumb{appearance:none;-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--gold-grad-flat);cursor:pointer;}
.vol-track::-moz-range-thumb{width:13px;height:13px;border-radius:50%;background:var(--gold-grad-flat);cursor:pointer;border:none;}

/* speed */
.speed-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:26px;}
.speed-lbl{font-family:"Cinzel",serif;font-size:.6rem;color:var(--muted-dim);letter-spacing:.1em;text-transform:uppercase;}
.speed-btn{font-family:"Cinzel",serif;font-size:.72rem;padding:5px 11px;border-radius:20px;border:1px solid var(--line-soft);background:none;color:var(--muted-dim);cursor:pointer;transition:.18s;}
.speed-btn:hover{border-color:var(--gold-500);color:var(--gold-100);}
.speed-btn.on{background:rgba(214,162,62,.1);border-color:var(--gold-500);color:var(--gold-100);}

/* download */
.dl-btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;font-weight:700;font-size:.9rem;color:var(--navy-900);background:var(--gold-grad-flat);padding:14px 20px;border-radius:13px;border:none;cursor:pointer;font-family:"Hanken Grotesk",sans-serif;box-shadow:0 10px 26px rgba(214,162,62,.25);transition:.2s;text-decoration:none;}
.dl-btn:hover{transform:translateY(-2px);box-shadow:0 14px 32px rgba(214,162,62,.38);}

/* keyboard hint */
.hint{text-align:center;margin-top:16px;font-size:.76rem;color:var(--muted-dim);}
.hint kbd{background:rgba(157,176,214,.08);border:1px solid var(--line-soft);border-radius:5px;padding:2px 7px;font-family:inherit;font-size:.74rem;color:var(--muted);}

@media(max-width:480px){
  .card{padding:28px 20px 24px;border-radius:20px;}
  .cover-art{width:130px;height:130px;}
  .info h1{font-size:1.3rem;}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="brand">Descomplica Visto<small>Assessoria Consular</small></div>
  <a class="back" href="index.html">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Voltar ao guia
  </a>
</div>

<!-- MAIN -->
<div class="main">
  <span class="tex"></span>
  <div class="card">

    <!-- Cover art -->
    <div class="cover-art" id="coverArt">
      <img src="assets/globo-logo.png" alt="Descomplica Visto">
      <div class="waves" id="waves"></div>
    </div>

    <!-- Info -->
    <div class="info">
      <div class="eyebrow">Áudio · Material bônus</div>
      <h1>O Mapa do Visto<br><em class="gold">Americano</em></h1>
      <div class="by">Por <b>Descomplica Visto</b> · Assessoria Consular</div>
    </div>

    <!-- Progress -->
    <div class="progress-wrap">
      <div class="time-row">
        <span id="timeCur">0:00</span>
        <span id="timeTot">–:––</span>
      </div>
      <input class="track" type="range" id="seekBar" min="0" max="100" value="0" step="0.1">
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="ctrl-btn" id="btn15b" title="Voltar 15s">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/>
          <text x="6.5" y="14" fill="currentColor" stroke="none" font-family="Hanken Grotesk,sans-serif" font-size="5.5" font-weight="700">15</text>
        </svg>
      </button>
      <button class="ctrl-btn play-btn" id="playBtn" title="Play / Pause">
        <svg id="iconPlay" width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <svg id="iconPause" width="26" height="26" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
      <button class="ctrl-btn" id="btn15f" title="Avançar 15s">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-3.5"/>
          <text x="6.5" y="14" fill="currentColor" stroke="none" font-family="Hanken Grotesk,sans-serif" font-size="5.5" font-weight="700">15</text>
        </svg>
      </button>
    </div>

    <!-- Volume -->
    <div class="vol-row">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/></svg>
      <input class="vol-track" type="range" id="volBar" min="0" max="1" step="0.02" value="1">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
    </div>

    <!-- Speed -->
    <div class="speed-row">
      <span class="speed-lbl">Velocidade</span>
      <button class="speed-btn" data-rate="0.75">0.75×</button>
      <button class="speed-btn on" data-rate="1">1×</button>
      <button class="speed-btn" data-rate="1.25">1.25×</button>
      <button class="speed-btn" data-rate="1.5">1.5×</button>
      <button class="speed-btn" data-rate="2">2×</button>
    </div>

    <!-- Download -->
    <a class="dl-btn" id="dlBtn" href="assets/audiobook.mp3" download="Guia Completo - Descomplica Visto.mp3">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Baixar audiobook
    </a>

    <p class="hint">Use <kbd>Espaço</kbd> para pausar · <kbd>←</kbd> <kbd>→</kbd> para avançar 15s</p>

  </div>
</div>

<!-- hidden audio -->
<audio id="audio" preload="metadata" src="assets/audiobook.mp3"></audio>

<script>
const audio = document.getElementById('audio');
const seekBar = document.getElementById('seekBar');
const volBar = document.getElementById('volBar');
const timeCur = document.getElementById('timeCur');
const timeTot = document.getElementById('timeTot');
const playBtn = document.getElementById('playBtn');
const iconPlay = document.getElementById('iconPlay');
const iconPause = document.getElementById('iconPause');
const coverArt = document.getElementById('coverArt');
const wavesEl = document.getElementById('waves');

const SK = 'descomplica_audiobook_pos';

// Build wave bars
const BARS = 12;
const heights = [14,22,18,26,16,30,20,24,12,28,18,22];
const delays  = [0,.15,.3,.08,.25,.4,.12,.35,.05,.2,.38,.1];
wavesEl.innerHTML = heights.map((h,i)=>`<span style="--h:${h}px;--d:${0.5+delays[i]*0.8}s;animation-delay:${delays[i]}s"></span>`).join('');

function fmt(s){
  if(isNaN(s)||!isFinite(s)) return '–:––';
  const m=Math.floor(s/60), sc=Math.floor(s%60);
  return m+':'+(sc<10?'0':'')+sc;
}

function setPlaying(on){
  iconPlay.style.display  = on ? 'none'  : '';
  iconPause.style.display = on ? ''      : 'none';
  coverArt.classList.toggle('playing', on);
}

// Restore position
(function(){
  try{const p=parseFloat(localStorage.getItem(SK));if(p&&p>0){audio.currentTime=p;}}catch(e){}
})();

audio.addEventListener('loadedmetadata',()=>{
  timeTot.textContent=fmt(audio.duration);
  seekBar.max=audio.duration||100;
  // restore seek bar
  const p=parseFloat(localStorage.getItem(SK)||'0');
  if(p) seekBar.value=p;
});

audio.addEventListener('timeupdate',()=>{
  const t=audio.currentTime;
  timeCur.textContent=fmt(t);
  seekBar.value=t;
  try{localStorage.setItem(SK,t);}catch(e){}
});

audio.addEventListener('ended',()=>setPlaying(false));

// Play / pause
playBtn.onclick=()=>{
  if(audio.paused){audio.play();setPlaying(true);}
  else{audio.pause();setPlaying(false);}
};

// Seek
let seeking=false;
seekBar.addEventListener('mousedown',()=>seeking=true);
seekBar.addEventListener('touchstart',()=>seeking=true,{passive:true});
seekBar.addEventListener('input',()=>{audio.currentTime=seekBar.value;timeCur.textContent=fmt(parseFloat(seekBar.value));});
seekBar.addEventListener('change',()=>{seeking=false;});

// Volume
volBar.addEventListener('input',()=>{audio.volume=volBar.value;});

// Speed
document.querySelectorAll('.speed-btn').forEach(b=>{
  b.onclick=()=>{
    audio.playbackRate=parseFloat(b.dataset.rate);
    document.querySelectorAll('.speed-btn').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
  };
});

// Skip ±15s
document.getElementById('btn15b').onclick=()=>{audio.currentTime=Math.max(0,audio.currentTime-15);};
document.getElementById('btn15f').onclick=()=>{audio.currentTime=Math.min(audio.duration||Infinity,audio.currentTime+15);};

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT') return;
  if(e.code==='Space'){e.preventDefault();playBtn.click();}
  if(e.code==='ArrowLeft'){audio.currentTime=Math.max(0,audio.currentTime-15);}
  if(e.code==='ArrowRight'){audio.currentTime=Math.min(audio.duration||Infinity,audio.currentTime+15);}
});
</script>
</body>
</html>
