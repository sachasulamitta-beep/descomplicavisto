<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glossário Consular | Descomplica Visto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;1,500;1,600&family=Cinzel:wght@500;600;700&family=Hanken+Grotesk:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --navy-950:#040A18;--navy-900:#06112A;--navy-800:#091a3d;
  --gold-50:#FCEFC0;--gold-100:#F7E2A0;--gold-300:#EBC56A;--gold-500:#D6A23E;--gold-700:#A9781F;
  --ink:#ECF2FE;--muted:#9DB0D6;--muted-dim:#6F82A8;--line:rgba(214,162,62,.28);--line-soft:rgba(157,176,214,.16);
  --gold-grad:linear-gradient(174deg,#FCEFC0 0%,#F0CE78 30%,#D6A23E 58%,#A9781F 100%);
  --gold-grad-flat:linear-gradient(180deg,#F4D98A 0%,#D6A23E 60%,#B0801F 100%);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:"Hanken Grotesk",system-ui,sans-serif;background:var(--navy-950);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.65;}
a{color:inherit;text-decoration:none}
.gold{background:var(--gold-grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.serif{font-family:"Playfair Display",Georgia,serif;}

.topbar{position:sticky;top:0;z-index:40;background:rgba(6,17,42,.88);backdrop-filter:blur(14px);border-bottom:1px solid var(--line-soft);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;}
.topbar .brand{display:flex;align-items:center;gap:10px;font-family:"Playfair Display",serif;font-weight:700;font-size:.96rem;}
.topbar .brand small{display:block;font-family:"Cinzel",serif;font-size:.48rem;letter-spacing:.22em;color:var(--gold-300);margin-top:2px;}
.topbar .back{display:flex;align-items:center;gap:6px;font-size:.82rem;color:var(--muted);transition:color .18s;}
.topbar .back:hover{color:var(--gold-100);}

.wrap{max-width:860px;margin:0 auto;padding:0 28px;}

.hero{padding:54px 0 40px;text-align:center;background:radial-gradient(70% 60% at 50% 0%,rgba(28,79,156,.35),transparent 65%);}
.hero .eyebrow{font-family:"Cinzel",serif;letter-spacing:.28em;font-size:.62rem;color:var(--gold-300);text-transform:uppercase;}
.hero h1{font-family:"Playfair Display",serif;font-weight:800;font-size:clamp(2rem,4.5vw,3rem);line-height:1.08;margin:12px 0 0;text-wrap:balance;}
.hero p{color:var(--muted);font-size:1rem;margin:14px auto 0;max-width:52ch;}

.search-bar{max-width:520px;margin:28px auto 0;position:relative;}
.search-bar input{width:100%;background:rgba(9,26,61,.6);border:1px solid var(--line);border-radius:12px;padding:13px 16px 13px 44px;font-family:"Hanken Grotesk",sans-serif;font-size:.96rem;color:var(--ink);outline:none;transition:border-color .2s;}
.search-bar input::placeholder{color:var(--muted-dim);}
.search-bar input:focus{border-color:var(--gold-500);}
.search-bar .ic{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted-dim);}

.filters{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:22px 0 0;}
.filt{font-family:"Cinzel",serif;letter-spacing:.1em;font-size:.62rem;text-transform:uppercase;padding:7px 14px;border-radius:20px;border:1px solid var(--line-soft);background:rgba(9,26,61,.4);color:var(--muted-dim);cursor:pointer;transition:.18s;}
.filt:hover{border-color:var(--gold-500);color:var(--gold-100);}
.filt.on{background:var(--gold-grad-flat);border-color:transparent;color:#2a1c04;}

.content{padding:36px 0 80px;}
.cat-title{font-family:"Cinzel",serif;letter-spacing:.22em;font-size:.66rem;text-transform:uppercase;color:var(--gold-300);margin:36px 0 14px;display:flex;align-items:center;gap:12px;}
.cat-title::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent);}

.glist{display:grid;gap:10px;}
.gcard{border:1px solid var(--line-soft);border-radius:13px;overflow:hidden;background:linear-gradient(180deg,rgba(12,35,80,.32),rgba(6,17,42,.42));}
.gcard .gh{display:flex;align-items:flex-start;gap:14px;padding:16px 18px;cursor:pointer;user-select:none;}
.gcard .gh .en{flex:none;min-width:0;}
.gcard .gh .en .term{font-family:"Playfair Display",serif;font-weight:700;font-size:1.06rem;color:var(--gold-100);}
.gcard .gh .en .pt{font-size:.84rem;color:var(--muted);margin-top:2px;}
.gcard .gh .chev{flex:none;color:var(--gold-300);margin-left:auto;margin-top:2px;transition:transform .25s;}
.gcard.open .gh .chev{transform:rotate(180deg);}
.gcard .gdet{max-height:0;overflow:hidden;transition:max-height .32s ease;}
.gcard .gdet-in{padding:0 18px 18px;}
.gcard .gdet-in .exp{color:#dbe5f7;font-size:.93rem;line-height:1.6;border-top:1px solid var(--line-soft);padding-top:14px;}
.gcard .gdet-in .where{display:inline-flex;align-items:center;gap:6px;margin-top:10px;font-family:"Cinzel",serif;letter-spacing:.1em;font-size:.58rem;text-transform:uppercase;color:var(--muted-dim);background:rgba(157,176,214,.08);border:1px solid var(--line-soft);border-radius:20px;padding:5px 12px;}
.gcard .gdet-in .where svg{flex:none;}

.no-results{text-align:center;padding:48px 0;color:var(--muted-dim);font-style:italic;}

.print-btn{position:fixed;bottom:24px;right:24px;display:flex;align-items:center;gap:8px;font-weight:700;font-size:.86rem;color:var(--navy-900);background:var(--gold-grad-flat);padding:12px 20px;border-radius:12px;box-shadow:0 10px 28px rgba(0,0,0,.4);border:none;cursor:pointer;font-family:"Hanken Grotesk",sans-serif;transition:.2s;z-index:30;}
.print-btn:hover{transform:translateY(-2px);}

@media print{
  .topbar,.search-bar,.filters,.print-btn{display:none!important;}
  body{background:#fff;color:#1a1a1a;}
  .gcard{border:1px solid #ccc;page-break-inside:avoid;}
  .gcard .gdet{max-height:none!important;}
  .gcard.open .gdet,.gcard .gdet{max-height:none!important;}
  .gold{-webkit-text-fill-color:#a07010!important;background:none!important;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    Descomplica Visto
    <small>Assessoria Consular</small>
  </div>
  <a class="back" href="index.html">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Voltar ao guia
  </a>
</div>

<header class="hero">
  <div class="wrap">
    <div class="eyebrow">Material bônus</div>
    <h1 class="serif">Glossário <em class="gold">Consular</em></h1>
    <p>Termos em inglês, siglas e palavras-chave do processo de visto — com tradução, explicação simples e onde cada um aparece.</p>
  </div>
</header>

<div class="wrap">
  <div class="search-bar">
    <svg class="ic" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Buscar termo…" autocomplete="off">
  </div>
  <div class="filters" id="filters"></div>
</div>

<main class="wrap content" id="mainContent"></main>

<button class="print-btn" onclick="window.print()">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
  Imprimir glossário
</button>

<script>
const TERMS = [
  // DS-160
  {en:"DS-160", pt:"Formulário de solicitação de visto não-imigrante", exp:"Formulário eletrônico obrigatório que deve ser preenchido online antes de qualquer entrevista consular. Contém informações pessoais, profissionais, de viagem e histórico do solicitante.", where:"Preenchimento do formulário", cat:"DS-160"},
  {en:"Application ID", pt:"Número de identificação da solicitação", exp:"Código alfanumérico gerado ao iniciar o preenchimento do DS-160. É usado para salvar e retomar o formulário. Deve ser anotado com cuidado — sem ele, não é possível recuperar o formulário.", where:"DS-160 — início do preenchimento", cat:"DS-160"},
  {en:"Confirmation Page", pt:"Página de confirmação do DS-160", exp:"Documento gerado após a finalização e envio do DS-160. Contém o código de barras e o número de confirmação. Deve ser impresso e levado à entrevista consular.", where:"DS-160 — após envio", cat:"DS-160"},
  {en:"Given Name", pt:"Nome (primeiro nome)", exp:"Campo do DS-160 que corresponde ao seu primeiro nome, conforme está no passaporte. Não inclui o sobrenome.", where:"DS-160 — dados pessoais", cat:"DS-160"},
  {en:"Surname", pt:"Sobrenome", exp:"Campo do DS-160 que corresponde ao seu sobrenome (família), conforme está no passaporte.", where:"DS-160 — dados pessoais", cat:"DS-160"},
  {en:"Nationality", pt:"Nacionalidade", exp:"País de cidadania do solicitante. Deve ser preenchido conforme o passaporte.", where:"DS-160 — dados pessoais", cat:"DS-160"},
  {en:"Marital Status", pt:"Estado civil", exp:"Situação do solicitante: casado(a), solteiro(a), divorciado(a), viúvo(a), em união estável. Deve ser consistente com os documentos apresentados.", where:"DS-160 — dados pessoais", cat:"DS-160"},
  {en:"Spouse", pt:"Cônjuge", exp:"Marido ou esposa. No DS-160, há campos para informar dados do cônjuge (nome, data de nascimento, nacionalidade), mesmo que ele(a) não vá na viagem.", where:"DS-160 — dados pessoais", cat:"DS-160"},
  {en:"Children", pt:"Filhos", exp:"O DS-160 pergunta se o solicitante tem filhos, quantos e onde moram. Ter filhos no Brasil é um forte vínculo familiar.", where:"DS-160 — dados pessoais", cat:"DS-160"},
  {en:"Relatives", pt:"Parentes", exp:"Familiares do solicitante. O formulário pergunta sobre parentes nos EUA ou em outros países.", where:"DS-160 — dados pessoais e vínculos", cat:"DS-160"},
  {en:"Address", pt:"Endereço residencial", exp:"Endereço completo onde o solicitante reside atualmente. Deve ser real e comprovável.", where:"DS-160 — dados pessoais", cat:"DS-160"},
  {en:"Occupation", pt:"Profissão / Ocupação", exp:"Área de atuação profissional do solicitante. Deve ser informado de forma clara e coerente com os demais documentos.", where:"DS-160 — dados profissionais", cat:"DS-160"},
  {en:"Employer", pt:"Empregador / empresa onde trabalha", exp:"Nome da empresa, instituição ou organização onde o solicitante trabalha. Para autônomos ou empresários, é o nome da própria empresa.", where:"DS-160 — dados profissionais", cat:"DS-160"},
  {en:"Monthly Income", pt:"Renda mensal", exp:"Valor da renda mensal do solicitante, informado em reais. Deve ser compatível com o que pode ser comprovado com documentos (holerite, pró-labore, extratos).", where:"DS-160 — dados financeiros", cat:"DS-160"},
  {en:"Education", pt:"Escolaridade / Educação", exp:"Nível de formação do solicitante (ensino médio, superior, pós-graduação etc.) e nome da instituição de ensino.", where:"DS-160 — dados educacionais", cat:"DS-160"},
  {en:"Social Media", pt:"Redes sociais", exp:"O DS-160 solicita os handles (nomes de usuário) das redes sociais do solicitante nos últimos 5 anos (Instagram, Facebook, X/Twitter etc.). O campo é obrigatório — se não tiver, selecionar a opção correspondente.", where:"DS-160 — informações adicionais", cat:"DS-160"},
  {en:"Intended Date of Arrival", pt:"Data prevista de chegada aos EUA", exp:"Data em que o solicitante pretende entrar nos Estados Unidos. Deve ser informada no DS-160 e precisa ser coerente com o que for dito na entrevista.", where:"DS-160 — dados da viagem", cat:"DS-160"},
  {en:"Length of Stay", pt:"Tempo de permanência previsto", exp:"Quantidade de dias que o solicitante pretende ficar nos EUA. Deve ser um período curto e coerente com o objetivo da viagem declarado.", where:"DS-160 — dados da viagem", cat:"DS-160"},
  {en:"U.S. Contact", pt:"Contato nos EUA", exp:"Pessoa ou organização que o solicitante vai visitar ou que pode ser contatada nos EUA. Se não houver, pode-se informar o endereço do hotel.", where:"DS-160 — dados da viagem", cat:"DS-160"},
  {en:"Travel Companions", pt:"Companheiros de viagem", exp:"Pessoas que viajarão junto com o solicitante. Se viajar sozinho, informar isso. Se for em grupo ou família, listar os demais solicitantes.", where:"DS-160 — dados da viagem", cat:"DS-160"},
  // Pagamento
  {en:"MRV Fee", pt:"Taxa consular MRV", exp:"Taxa obrigatória paga antes do agendamento da entrevista. O valor varia conforme o tipo de visto. O pagamento pode ser feito por boleto, cartão ou PIX no site da CASV.", where:"Pagamento da taxa — Módulo 2", cat:"Pagamento"},
  {en:"Billing Address", pt:"Endereço de cobrança", exp:"Endereço vinculado ao cartão de crédito utilizado no pagamento da taxa consular. Deve ser preenchido corretamente para que o pagamento seja processado.", where:"Pagamento da taxa", cat:"Pagamento"},
  // Agendamento
  {en:"Appointment", pt:"Agendamento da entrevista", exp:"Marcação da data, horário e local da entrevista consular, realizada no site da CASV após o pagamento da taxa MRV.", where:"Agendamento — Módulo 3", cat:"Agendamento"},
  {en:"ASC / CASV", pt:"Centro de Suporte a Vistos / Centro de Atendimento ao Solicitante de Visto", exp:"Local onde o solicitante vai para coleta de biometria (impressões digitais e foto) e, dependendo do posto, para retirar o passaporte com o visto após aprovação.", where:"Agendamento e retirada do passaporte", cat:"Agendamento"},
  {en:"Delivery Service", pt:"Serviço de entrega do passaporte", exp:"Opção de receber o passaporte com o visto em casa pelos Correios, após aprovação. É uma opção paga (serviço premium), disponível no ato do agendamento.", where:"Agendamento — opção de entrega", cat:"Agendamento"},
  {en:"Premium Delivery", pt:"Entrega premium (Correios)", exp:"Serviço pago opcional que entrega o passaporte aprovado no endereço do solicitante, via Correios. O pagamento é feito por cartão de crédito durante o agendamento.", where:"Agendamento — Módulo 3", cat:"Agendamento"},
  // Passaporte
  {en:"Passport", pt:"Passaporte", exp:"Documento de viagem internacional obrigatório. Para solicitar o visto, o passaporte deve estar válido, idealmente com pelo menos 6 meses de validade além da estadia prevista.", where:"Documentação — Módulo 0 e dia da entrevista", cat:"Passaporte"},
  {en:"Previous Visa", pt:"Visto anterior", exp:"Visto concedido em solicitação anterior. Se o solicitante tiver um visto anterior (inclusive em passaporte vencido), é importante levar o passaporte antigo à entrevista.", where:"DS-160 — histórico de vistos", cat:"Passaporte"},
  // Entrevista
  {en:"Consular Interview", pt:"Entrevista consular", exp:"Etapa presencial do processo de visto, realizada no consulado. O Oficial Consular faz perguntas sobre o perfil, a viagem e os vínculos com o Brasil. A decisão do visto é tomada ali.", where:"Entrevista — Módulo 4", cat:"Entrevista"},
  // Renovação
  {en:"Visa Renewal", pt:"Renovação de visto", exp:"Processo de solicitar um novo visto quando o anterior está vencido ou próximo do vencimento. Pode haver isenção de entrevista em alguns casos, mas não é garantida.", where:"Renovação — Módulo 4", cat:"Renovação"},
  {en:"Interview Waiver", pt:"Isenção de entrevista", exp:"Em alguns casos de renovação de visto B1/B2 (turismo/negócios), o solicitante pode ser dispensado da entrevista presencial, desde que atenda a critérios específicos definidos pelo consulado.", where:"Renovação de visto — Módulo 4", cat:"Renovação"}
];

const CATS = [...new Set(TERMS.map(t=>t.cat))];
let activeCat = null;
let searchVal = '';

function renderFilters(){
  const f = document.getElementById('filters');
  f.innerHTML = CATS.map(c=>`<button class="filt${activeCat===c?' on':''}" data-cat="${c}">${c}</button>`).join('');
  f.querySelectorAll('.filt').forEach(b=>b.onclick=()=>{activeCat=activeCat===b.dataset.cat?null:b.dataset.cat;renderFilters();renderTerms();});
}

function renderTerms(){
  const q = searchVal.toLowerCase();
  const filtered = TERMS.filter(t=>{
    const matchCat = !activeCat || t.cat===activeCat;
    const matchQ = !q || t.en.toLowerCase().includes(q)||t.pt.toLowerCase().includes(q)||t.exp.toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  const byCat = {};
  CATS.forEach(c=>{byCat[c]=[];});
  filtered.forEach(t=>byCat[t.cat].push(t));

  let html='';
  CATS.forEach(cat=>{
    if(!byCat[cat].length) return;
    if(!activeCat) html+=`<div class="cat-title">${cat}</div>`;
    html+=`<div class="glist">`;
    byCat[cat].forEach((t,i)=>{
      html+=`<div class="gcard" data-idx="${cat+i}">
        <div class="gh">
          <div class="en"><div class="term">${highlight(t.en,q)}</div><div class="pt">${highlight(t.pt,q)}</div></div>
          <span class="chev"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></span>
        </div>
        <div class="gdet"><div class="gdet-in">
          <div class="exp">${t.exp}</div>
          <div class="where"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg> ${t.where}</div>
        </div></div>
      </div>`;
    });
    html+=`</div>`;
  });

  const main = document.getElementById('mainContent');
  if(!filtered.length){main.innerHTML='<div class="no-results">Nenhum termo encontrado.</div>';return;}
  main.innerHTML=html;

  main.querySelectorAll('.gcard').forEach(card=>{
    card.querySelector('.gh').onclick=()=>{
      const open=card.classList.contains('open');
      if(open){card.classList.remove('open');card.querySelector('.gdet').style.maxHeight=null;}
      else{card.classList.add('open');card.querySelector('.gdet').style.maxHeight=card.querySelector('.gdet').scrollHeight+'px';}
    };
  });
}

function highlight(str,q){
  if(!q) return str;
  const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return str.replace(re,'<mark style="background:rgba(214,162,62,.3);border-radius:3px;padding:0 2px;color:inherit">$1</mark>');
}

document.getElementById('searchInput').oninput=e=>{searchVal=e.target.value;renderTerms();};

renderFilters();
renderTerms();
</script>
</body>
</html>
