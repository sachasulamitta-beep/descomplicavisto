<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxa consular & Agendamento — Telas · Descomplica Visto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;1,500;1,600&family=Cinzel:wght@500;600;700&family=Hanken+Grotesk:wght@300;400;500;600;700;800&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy-950:#040A18;--navy-900:#06112A;--navy-800:#091a3d;--navy-700:#0c2350;--navy-600:#123067;
  --royal:#1c4f9c;--gold-50:#FCEFC0;--gold-100:#F7E2A0;--gold-300:#EBC56A;--gold-500:#D6A23E;--gold-600:#C2902F;--gold-700:#A9781F;
  --ink:#ECF2FE;--muted:#9DB0D6;--muted-dim:#6F82A8;--line:rgba(214,162,62,.28);--line-soft:rgba(157,176,214,.16);
  --green:#1f9e57;--red:#cf6a5e;
  --form-bg:#eef1f6;--form-border:#c4ccd8;
  --gold-grad:linear-gradient(174deg,#FCEFC0 0%,#F0CE78 30%,#D6A23E 58%,#A9781F 100%);
  --gold-grad-flat:linear-gradient(180deg,#F4D98A 0%,#D6A23E 60%,#B0801F 100%);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:"Hanken Grotesk",system-ui,sans-serif;background:#02060f;color:var(--ink);-webkit-font-smoothing:antialiased;}
deck-stage:not(:defined){visibility:hidden}

.slide{position:relative;width:1920px;height:1080px;overflow:hidden;font-family:"Hanken Grotesk",sans-serif;color:var(--ink);
  background:radial-gradient(70% 60% at 50% 14%, rgba(28,79,156,.40), transparent 60%),radial-gradient(90% 80% at 50% 120%, rgba(214,162,62,.07), transparent 55%),linear-gradient(180deg,#071435 0%, #050e25 50%, #040a18 100%);}
.dots{position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(rgba(255,255,255,.05) 1px,transparent 1.5px);background-size:42px 42px;-webkit-mask-image:radial-gradient(110% 90% at 50% 30%,#000 30%,transparent 80%);mask-image:radial-gradient(110% 90% at 50% 30%,#000 30%,transparent 80%);opacity:.5}
.serif{font-family:"Playfair Display",Georgia,serif}
.gold-text{background:var(--gold-grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}

.s-head{position:absolute;top:46px;left:70px;display:flex;align-items:center;gap:16px;z-index:5}
.s-head .logo{height:56px;width:56px;object-fit:contain}
.s-head .a{font-family:"Playfair Display",serif;font-weight:700;font-size:1.34rem;line-height:1}
.s-head .b{font-family:"Cinzel",serif;letter-spacing:.22em;font-size:.68rem;color:var(--gold-300);text-transform:uppercase;margin-top:6px}
.s-step{position:absolute;top:52px;right:70px;z-index:5;display:flex;align-items:center;gap:14px}
.s-step .pill{font-family:"Cinzel",serif;letter-spacing:.16em;text-transform:uppercase;font-size:.92rem;color:var(--gold-100);border:1px solid var(--line);border-radius:40px;padding:11px 24px;background:rgba(214,162,62,.06)}
.s-step .pill b{color:#fff;font-family:"Playfair Display",serif;font-weight:700;font-size:1.1rem;letter-spacing:0}
.s-foot{position:absolute;bottom:34px;left:70px;right:70px;z-index:5;display:flex;align-items:flex-end;justify-content:space-between;gap:24px}
.s-foot .brand{font-family:"Cinzel",serif;letter-spacing:.22em;font-size:.74rem;text-transform:uppercase;color:var(--muted)}
.s-foot .legal{font-size:.76rem;line-height:1.5;max-width:920px;text-align:right;color:var(--muted-dim);font-style:italic}

.scene{position:absolute;left:90px;right:90px;top:150px;bottom:150px;display:grid;grid-template-columns:1.12fr .88fr;gap:64px;align-items:center}
.win{border-radius:16px;overflow:hidden;border:1px solid rgba(0,0,0,.4);box-shadow:0 44px 90px rgba(0,0,0,.6)}
.win-bar{display:flex;align-items:center;gap:9px;background:#d8dce4;padding:14px 18px}
.win-bar .dot{width:13px;height:13px;border-radius:50%}.win-bar .r{background:#ed6a5e}.win-bar .y{background:#f4c14e}.win-bar .g{background:#61c554}
.win-bar .url{flex:1;margin-left:12px;background:#fff;border-radius:7px;padding:8px 16px;font-size:.92rem;color:#7a8295;display:flex;gap:9px;align-items:center}
.win-bar .url svg{color:#1f9e57;flex:none}
.win-body{background:var(--form-bg);padding:30px 34px 34px;color:#1f2a3d;min-height:520px;max-height:700px;overflow:hidden;position:relative}
.casv{display:flex;align-items:center;gap:14px;padding-bottom:16px;border-bottom:3px solid #2e3192;margin-bottom:22px}
.casv .seal{width:42px;height:42px;border-radius:7px;background:#2e3192;flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:.8rem}
.casv .a{font-family:"Playfair Display",serif;font-weight:700;font-size:1.18rem;color:#2e3192}
.casv .b{font-size:.74rem;letter-spacing:.04em;color:#7a8295;margin-top:3px}
.fsec{font-family:"Playfair Display",serif;color:#1f3a66;font-weight:700;font-size:1.46rem;margin-bottom:20px}

.fld{margin-bottom:14px;position:relative}
.fld .lb{font-size:1.02rem;font-weight:600;color:#2a3850;margin-bottom:8px;display:block}
.fld .hint{font-size:.82rem;color:#8a93a5;margin-top:5px}
.inp{background:#fff;border:1px solid var(--form-border);border-radius:7px;padding:11px 15px;font-size:1.06rem;color:#33405a;min-height:44px;display:flex;align-items:center}
.inp.hl{background:#fffbe6;border-color:#d8b94a;color:#4a3d12;font-weight:600;box-shadow:0 0 0 4px rgba(214,162,62,.20)}
.inp.pick{justify-content:space-between}
.inp.pick svg{color:#7a8295;flex:none}
.inp.ph{color:#aab1bf}
.inp.area{align-items:flex-start;min-height:78px;line-height:1.4}
.radios{display:flex;gap:26px;align-items:center}
.rd{display:flex;align-items:center;gap:9px;font-size:1.02rem;color:#33405a}
.rd .c{width:18px;height:18px;border-radius:50%;border:2px solid #8a93a5;display:flex;align-items:center;justify-content:center;flex:none}
.rd.on .c{border-color:#2e3192;box-shadow:0 0 0 2px rgba(46,49,146,.16)}.rd.on .c::after{content:"";width:8px;height:8px;border-radius:50%;background:#2e3192}
.fbtn{display:inline-flex;align-items:center;gap:9px;background:#1f9e57;color:#fff;font-weight:700;font-size:.98rem;padding:13px 24px;border-radius:6px}
.fbtn.grey{background:#5b6577}.fbtn.purple{background:#5a3ec8}
.dropdown{margin-top:8px;border:1px solid #c4ccd8;border-radius:7px;overflow:hidden;background:#fff}
.dropdown .opt{padding:9px 15px;font-size:.98rem;color:#33405a;border-bottom:1px solid rgba(0,0,0,.05)}
.dropdown .opt.sel{background:#1c66d6;color:#fff}
.dropdown .opt:last-child{border-bottom:none}
.payrow{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid var(--form-border);border-radius:9px;padding:15px 18px;margin-bottom:12px;font-size:1.12rem;color:#2a3850;font-weight:600}
.payrow .rc{width:22px;height:22px;border-radius:50%;border:2px solid #8a93a5;flex:none}
.payrow.sel{border-color:#5a3ec8;box-shadow:0 0 0 3px rgba(90,62,200,.14)}
.payrow.sel .rc{border-color:#5a3ec8;position:relative}.payrow.sel .rc::after{content:"";position:absolute;inset:4px;border-radius:50%;background:#5a3ec8}
.payrow .val{margin-left:auto;font-family:"Playfair Display",serif;font-weight:700;color:#15233c}
.tbl{width:100%;background:#fff;border:1px solid var(--form-border);border-radius:9px;overflow:hidden;font-size:1rem}
.tbl .tr{display:flex;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #eef1f6;color:#33405a}
.tbl .tr.h{background:#f3f5f9;font-weight:700;color:#15233c}
.tbl .tr.t{font-weight:800;color:#15233c}
.statusbar{display:flex;align-items:center;gap:14px;background:#fff;border-left:5px solid #cf6a5e;border-radius:8px;padding:16px 18px;margin-bottom:18px}
.statusbar.ok{border-left-color:#1f9e57}
.statusbar .ico{width:34px;height:34px;border-radius:50%;background:#cf6a5e;color:#fff;display:flex;align-items:center;justify-content:center;flex:none;font-weight:800}
.statusbar.ok .ico{background:#1f9e57}
.statusbar .st{font-size:.78rem;color:#7a8295;text-transform:uppercase;letter-spacing:.05em}
.statusbar .lb{font-family:"Playfair Display",serif;font-weight:700;font-size:1.16rem;color:#15233c}
.statusbar .cont{margin-left:auto;background:#1f9e57;color:#fff;font-weight:700;font-size:.9rem;padding:9px 18px;border-radius:6px}
.qrbox{width:200px;height:200px;background:#fff;border-radius:12px;padding:14px;margin:8px auto 0;box-shadow:0 14px 30px rgba(0,0,0,.2)}
.qrbox .g{width:100%;height:100%;background:repeating-conic-gradient(#0b0b0b 0% 25%, #fff 0% 50%) 0 0/22px 22px;position:relative;border-radius:4px}
.notebox{font-size:1rem;color:#33405a;line-height:1.55;background:#fff;border:1px solid var(--form-border);border-radius:9px;padding:16px 18px;margin-bottom:16px}
.notebox b{color:#15233c}
.calbox{background:#fff;border:1px solid var(--form-border);border-radius:9px;padding:14px;margin-bottom:14px;max-width:470px}
.calhead{background:#2e3a4f;color:#fff;border-radius:6px;padding:8px 14px;font-weight:700;text-align:center;margin-bottom:10px;font-size:.98rem}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;max-width:430px}
.calgrid .d{height:40px;display:flex;align-items:center;justify-content:center;font-size:.9rem;color:#aab1bf;border-radius:5px}
.calgrid .d.av{color:#1c4f9c;background:#dce9fb;font-weight:700}
.calgrid .d.on{background:#d8b94a;color:#3a2f0a;font-weight:800;box-shadow:0 0 0 2px rgba(214,162,62,.4)}

.tip{position:relative;padding-right:10px}
.tip .badge{display:inline-flex;align-items:center;gap:11px;font-family:"Cinzel",serif;letter-spacing:.18em;text-transform:uppercase;font-size:.82rem;font-weight:600;padding:11px 20px;border-radius:40px;margin-bottom:26px}
.tip .badge svg{flex:none}
.badge.dica{color:#2a1c04;background:var(--gold-grad-flat)}
.badge.erro{color:#fff;background:linear-gradient(180deg,#e58479,#b94e44)}
.badge.atencao{color:#2a1c04;background:linear-gradient(180deg,#F4D98A,#D6A23E)}
.badge.check{color:#fff;background:linear-gradient(180deg,#3bc977,#1f9e57)}
.badge.info{color:var(--gold-100);background:rgba(214,162,62,.08);border:1px solid var(--line)}
.tip .num{font-family:"Playfair Display",serif;font-weight:800;font-style:italic;font-size:5.4rem;line-height:.8;background:var(--gold-grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;opacity:.9;margin-bottom:14px}
.tip h2{font-family:"Playfair Display",serif;font-weight:700;font-size:2.7rem;line-height:1.1;margin-bottom:22px;text-wrap:balance}
.tip h2 em{font-style:italic}
.tip p{font-size:1.4rem;line-height:1.56;color:#dce6f8;text-wrap:pretty}
.tip p strong{color:#fff;background:linear-gradient(transparent 60%,rgba(214,162,62,.28) 60%);padding:0 3px}
.tip .scribble{font-family:"Caveat",cursive;color:var(--gold-100);font-size:1.74rem;line-height:1.22;margin-top:24px;padding:16px 22px;border-left:3px solid var(--gold-500);background:rgba(214,162,62,.06);border-radius:0 12px 12px 0}
.tip ul{list-style:none;display:flex;flex-direction:column;gap:12px;margin-top:20px}
.tip ul li{display:flex;gap:13px;align-items:flex-start;font-size:1.18rem;color:var(--ink);line-height:1.45}
.tip ul li .dot{width:10px;height:10px;border-radius:50%;background:var(--gold-grad-flat);flex:none;margin-top:9px;box-shadow:0 0 12px rgba(214,162,62,.5)}
.tip .flag{display:inline-flex;align-items:center;gap:10px;margin-top:22px;border:1px solid var(--red);background:rgba(207,106,94,.10);color:#f0c4bd;border-radius:30px;padding:11px 20px;font-size:1.05rem;font-weight:600}
.tip .flag svg{color:var(--red);flex:none}
.arrow{position:absolute;left:-86px;top:50%;width:120px;height:90px;pointer-events:none;color:var(--gold-300)}

.progress{position:absolute;left:50%;bottom:88px;transform:translateX(-50%);display:flex;gap:7px;z-index:5;flex-wrap:wrap;max-width:1000px;justify-content:center}
.progress i{width:9px;height:9px;border-radius:50%;background:rgba(157,176,214,.22)}
.progress i.on{background:var(--gold-grad-flat);box-shadow:0 0 10px rgba(214,162,62,.55);width:24px;border-radius:5px}
.progress i.done{background:rgba(214,162,62,.42)}

/* section divider slide */
.divslide{display:flex;align-items:center;justify-content:center;text-align:center}
.divslide .inner{position:relative;z-index:2;max-width:1300px;padding:0 90px}
.divslide .crest{width:200px;height:200px;display:flex;align-items:center;justify-content:center;margin:0 auto 30px;box-shadow:0 14px 40px rgba(214,162,62,.22)}
.divslide .crest img{width:200px;height:200px;object-fit:contain;filter:drop-shadow(0 12px 30px rgba(214,162,62,.35))}
.divslide .step{font-family:"Cinzel",serif;letter-spacing:.42em;text-transform:uppercase;font-size:1rem;color:var(--gold-300);margin-bottom:26px}
.divslide .num{font-family:"Playfair Display",serif;font-weight:800;font-style:italic;font-size:10rem;line-height:.85;background:var(--gold-grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}
.divslide h1{font-family:"Playfair Display",serif;font-weight:800;font-size:5rem;line-height:1.04;letter-spacing:-.015em;margin-bottom:22px;text-wrap:balance}
.divslide h1 em{font-style:italic}
.divslide p{font-size:1.42rem;color:var(--muted);max-width:820px;margin:0 auto;line-height:1.55}
.divslide .ornament{display:flex;align-items:center;gap:18px;justify-content:center;margin-top:44px}
.divslide .ornament .ln{height:1px;width:130px;background:linear-gradient(90deg,transparent,var(--gold-500))}
.divslide .ornament .ln.r{background:linear-gradient(270deg,transparent,var(--gold-500))}
.divslide .ornament .dia{width:13px;height:13px;background:var(--gold-grad-flat);transform:rotate(45deg);box-shadow:0 0 16px rgba(214,162,62,.55)}

/* =========================================
   MOTION LAYER — Taxa Consular & Agendamento
   Cinético + loops no slide ativo
   ========================================= */
@media (prefers-reduced-motion: no-preference){
  @keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:none}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes fadeScale{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:none}}
  @keyframes slideInL{from{opacity:0;transform:translateX(-34px)}to{opacity:1;transform:none}}
  @keyframes slideInR{from{opacity:0;transform:translateX(34px)}to{opacity:1;transform:none}}
  @keyframes slideInUp{from{opacity:0;transform:translateY(40px) scale(.985)}to{opacity:1;transform:none}}
  @keyframes drawLine{from{transform:scaleX(0)}to{transform:scaleX(1)}}
  @keyframes drawPath{to{stroke-dashoffset:0}}
  @keyframes diaSpin{0%,100%{transform:rotate(45deg) scale(1);filter:drop-shadow(0 0 14px rgba(214,162,62,.55))}50%{transform:rotate(225deg) scale(1.1);filter:drop-shadow(0 0 22px rgba(214,162,62,.85))}}
  @keyframes hlPulse{0%,100%{box-shadow:0 0 0 4px rgba(214,162,62,.20)}50%{box-shadow:0 0 0 7px rgba(214,162,62,.34), 0 0 22px rgba(214,162,62,.22)}}
  @keyframes badgePulse{0%,100%{box-shadow:0 0 0 0 rgba(214,162,62,0)}50%{box-shadow:0 0 0 6px rgba(214,162,62,.18)}}
  @keyframes badgePulseRed{0%,100%{box-shadow:0 0 0 0 rgba(207,106,94,0)}50%{box-shadow:0 0 0 6px rgba(207,106,94,.22)}}
  @keyframes badgePulseGreen{0%,100%{box-shadow:0 0 0 0 rgba(31,158,87,0)}50%{box-shadow:0 0 0 6px rgba(31,158,87,.22)}}
  @keyframes dotPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.4)}}
  @keyframes arrowFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  @keyframes scribbleSlide{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
  @keyframes glow{0%,100%{box-shadow:0 14px 40px rgba(214,162,62,.22),inset 0 0 30px rgba(214,162,62,.18)}50%{box-shadow:0 18px 56px rgba(214,162,62,.42),inset 0 0 44px rgba(214,162,62,.32)}}
  @keyframes payPulse{0%,100%{box-shadow:0 0 0 3px rgba(90,62,200,.14)}50%{box-shadow:0 0 0 7px rgba(90,62,200,.28)}}
  @keyframes calCellIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
  @keyframes calOnPulse{0%,100%{box-shadow:0 0 0 2px rgba(214,162,62,.4)}50%{box-shadow:0 0 0 5px rgba(214,162,62,.65), 0 0 14px rgba(214,162,62,.3)}}
  @keyframes nudge{0%,100%{transform:translateX(0)}50%{transform:translateX(8px)}}
  @keyframes progressBarFill{from{width:0}to{width:100%}}

  /* ---------- CHROME comum ---------- */
  [data-deck-active] .s-head{animation:fadeIn .55s ease-out both}
  [data-deck-active] .s-step{animation:fadeIn .55s ease-out .12s both}
  [data-deck-active] .s-foot{animation:fadeIn .7s ease-out .8s both}

  /* ---------- ABERTURA (divslide genérico) ---------- */
  [data-deck-active] .divslide .crest{animation:fadeScale .9s ease-out both, glow 5s ease-in-out 1.2s infinite}
  [data-deck-active] .divslide .step{animation:fadeUp .6s ease-out .2s both}
  [data-deck-active] .divslide .num{animation:fadeUp 1s ease-out .3s both}
  [data-deck-active] .divslide h2{animation:fadeUp .9s ease-out .45s both}
  [data-deck-active] .divslide p{animation:fadeUp .8s ease-out .62s both}
  [data-deck-active] .divslide .ornament .ln{transform-origin:right;animation:drawLine .8s ease-out 1s both}
  [data-deck-active] .divslide .ornament .ln.r{transform-origin:left}
  [data-deck-active] .divslide .ornament .dia{animation:fadeIn .4s ease-out 1.45s both, diaSpin 6s ease-in-out 2.2s infinite}

  /* ---------- JANELA DO NAVEGADOR ---------- */
  [data-deck-active] .win{animation:slideInUp .75s cubic-bezier(.2,.7,.2,1) .1s both}
  [data-deck-active] .win-bar .dot{animation:fadeIn .4s ease-out both}
  [data-deck-active] .win-bar .dot:nth-child(1){animation-delay:.5s}
  [data-deck-active] .win-bar .dot:nth-child(2){animation-delay:.58s}
  [data-deck-active] .win-bar .dot:nth-child(3){animation-delay:.66s}
  [data-deck-active] .win-bar .url{animation:fadeUp .55s ease-out .75s both}

  /* ---------- CABEÇALHO CEAC/CGI ---------- */
  [data-deck-active] .casv{animation:fadeUp .55s ease-out .55s both;position:relative}
  [data-deck-active] .casv::after{content:"";position:absolute;left:0;right:0;bottom:0;height:3px;background:#2e3192;transform-origin:left;animation:drawLine .7s ease-out .85s both}
  [data-deck-active] .casv .seal{animation:fadeScale .6s ease-out .6s both, badgePulse 4s ease-in-out 2s infinite}
  [data-deck-active] .fsec{animation:fadeUp .5s ease-out .72s both}

  /* ---------- CAMPOS EM CASCATA ---------- */
  [data-deck-active] .win-body .fld{animation:fadeUp .5s ease-out both;animation-delay:calc(.85s + var(--fi,0)*.07s)}
  [data-deck-active] .win-body .fld:nth-child(1){--fi:0}
  [data-deck-active] .win-body .fld:nth-child(2){--fi:1}
  [data-deck-active] .win-body .fld:nth-child(3){--fi:2}
  [data-deck-active] .win-body .fld:nth-child(4){--fi:3}
  [data-deck-active] .win-body .fld:nth-child(5){--fi:4}
  [data-deck-active] .win-body .fld:nth-child(6){--fi:5}
  [data-deck-active] .win-body .fld:nth-child(7){--fi:6}
  [data-deck-active] .win-body .fld:nth-child(8){--fi:7}
  [data-deck-active] .win-body .fld:nth-child(9){--fi:8}
  [data-deck-active] .win-body .fld:nth-child(10){--fi:9}

  /* campo destacado pulse */
  [data-deck-active] .inp.hl{animation:hlPulse 2.6s ease-in-out 1.4s infinite}

  /* ---------- LINHAS DE PAGAMENTO (.payrow) ---------- */
  [data-deck-active] .payrow{animation:slideInL .5s ease-out both;animation-delay:calc(.85s + var(--pi,0)*.09s)}
  [data-deck-active] .payrow:nth-child(1){--pi:0}
  [data-deck-active] .payrow:nth-child(2){--pi:1}
  [data-deck-active] .payrow:nth-child(3){--pi:2}
  [data-deck-active] .payrow:nth-child(4){--pi:3}
  [data-deck-active] .payrow.sel{animation:slideInL .5s ease-out .85s both, payPulse 3.2s ease-in-out 1.6s infinite}

  /* ---------- TABELA DE TAXAS (.tbl) ---------- */
  [data-deck-active] .tbl{animation:slideInUp .65s ease-out .75s both}
  [data-deck-active] .tbl .tr{animation:fadeUp .4s ease-out both;animation-delay:calc(.95s + var(--ti,0)*.07s)}

function calCells(){

  const avail=[8,11,12,15,18,22,23,25,26,27,28,29];
  let cells='';
  for(let i=0;i<5;i++)cells+='<span class="d"></span>'; // Su-Th before Fri 1
  for(let d=1;d<=31;d++){

    cells+=`<span class="d ${cls}">${d}</span>`;
  }
  return cells;
}

      <div class="ornament"><span class="ln"></span><span class="dia"></span><span class="ln r"></span></div>
    </div>
    <div class="s-foot"><div class="brand">Descomplica Visto · Assessoria Consular</div><div class="legal">${legalText(true)}</div></div>
  </div>
</section>`;

let stepNum=0;
const totalSteps=S.filter(s=>!s.divider).length;
S.forEach((s)=>{
  if(s.divider){
    html+=`<section data-label="${s.step}">
      <div class="slide divslide">
        <span class="dots"></span>
        <div class="s-head"><img class="logo" src="assets/globo-logo.png" alt=""><div><div class="a">Descomplica Visto</div><div class="b">Assessoria Consular</div></div></div>
        <div class="inner">
          <div class="crest"><img src="assets/globo-logo.png" alt=""></div>
          <div class="step">${s.step}</div>
          <div class="num">${s.num}</div>
          <h1>${s.h}</h1>
          <p>${s.p}</p>
          <div class="ornament"><span class="ln"></span><span class="dia"></span><span class="ln r"></span></div>
        </div>
        <div class="s-foot"><div class="brand">Descomplica Visto · Assessoria Consular</div><div class="legal">${legalText(true)}</div></div>
      </div>
    </section>`;
    return;
  }
  stepNum++;
  const n=stepNum;
  const dots=Array.from({length:totalSteps},(_,k)=>`<i class="${k<n-1?'done':(k===n-1?'on':'')}"></i>`).join('');
  html+=`<section data-label="${(n<10?'0':'')+n} ${s.sec}">
   <div class="slide">
     <span class="dots"></span>
     <div class="s-head"><img class="logo" src="assets/globo-logo.png" alt=""><div><div class="a">Descomplica Visto</div><div class="b">Assessoria Consular</div></div></div>
     <div class="s-step"><span class="pill">Tela <b>${(n<10?'0':'')+n}</b> / ${totalSteps}</span></div>
     <div class="scene">
       <div class="win">
         <div class="win-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="url">${lock} ${s.url}</span></div>
         <div class="win-body">
           <div class="casv"><span class="seal">CASV</span><div><div class="a">U.S. Visa — Brasil</div><div class="b">Official U.S. Department of State Visa Appointment Service</div></div></div>
           <div class="fsec">${s.sec}</div>
           ${s.fields}
         </div>
       </div>
       <div class="tip">
         ${s.arrow?arrowSvg:''}
         <div class="badge ${s.kind}">${badgeIcon[s.kind]} ${badgeLabel[s.kind]}</div>
         <div class="num">${(n<10?'0':'')+n}</div>
         <h2>${s.h}</h2>
         <p>${s.tip}</p>
         ${s.flag?`<span class="flag"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/><path d="M12 9v4M12 17h.01"/></svg>${s.flag}</span>`:''}
       </div>
     </div>
     <div class="progress">${dots}</div>
     <div class="s-foot"><div class="brand">Descomplica Visto · Assessoria Consular</div><div class="legal">${legalText(s.kind==='atencao')}</div></div>
   </div>
  </section>`;
});

stage.innerHTML=html;
const sc=document.createElement('script');
sc.src='deck-stage.js';
document.body.appendChild(sc);
</script>
</body>
</html>
