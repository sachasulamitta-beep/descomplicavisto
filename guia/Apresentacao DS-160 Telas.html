<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DS-160 — Telas do formulário · Descomplica Visto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;1,500;1,600&family=Cinzel:wght@500;600;700&family=Hanken+Grotesk:wght@300;400;500;600;700;800&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy-950:#040A18;--navy-900:#06112A;--navy-800:#091a3d;--navy-700:#0c2350;--navy-600:#123067;
  --royal:#1c4f9c;--gold-50:#FCEFC0;--gold-100:#F7E2A0;--gold-300:#EBC56A;--gold-500:#D6A23E;--gold-600:#C2902F;--gold-700:#A9781F;
  --ink:#ECF2FE;--muted:#9DB0D6;--muted-dim:#6F82A8;--line:rgba(214,162,62,.28);--line-soft:rgba(157,176,214,.16);
  --green:#1f9e57;--red:#cf6a5e;
  --form-bg:#eef1f6;--form-border:#c4ccd8;
  --gold-grad:linear-gradient(174deg,#FCEFC0 0%,#F0CE78 30%,#D6A23E 58%,#A9781F 100%);
  --gold-grad-flat:linear-gradient(180deg,#F4D98A 0%,#D6A23E 60%,#B0801F 100%);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:"Hanken Grotesk",system-ui,sans-serif;background:#02060f;color:var(--ink);-webkit-font-smoothing:antialiased;}
deck-stage:not(:defined){visibility:hidden}

.slide{
  position:relative;width:1920px;height:1080px;overflow:hidden;
  font-family:"Hanken Grotesk",sans-serif;color:var(--ink);
  background:
    radial-gradient(70% 60% at 50% 14%, rgba(28,79,156,.40), transparent 60%),
    radial-gradient(90% 80% at 50% 120%, rgba(214,162,62,.07), transparent 55%),
    linear-gradient(180deg,#071435 0%, #050e25 50%, #040a18 100%);
}
.dots{position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(rgba(255,255,255,.05) 1px,transparent 1.5px);background-size:42px 42px;-webkit-mask-image:radial-gradient(110% 90% at 50% 30%,#000 30%,transparent 80%);mask-image:radial-gradient(110% 90% at 50% 30%,#000 30%,transparent 80%);opacity:.5}
.serif{font-family:"Playfair Display",Georgia,serif}
.gold-text{background:var(--gold-grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}

/* chrome */
.s-head{position:absolute;top:46px;left:70px;display:flex;align-items:center;gap:16px;z-index:5}
.s-head .logo{height:56px;width:56px;object-fit:contain}
.s-head .a{font-family:"Playfair Display",serif;font-weight:700;font-size:1.34rem;line-height:1}
.s-head .b{font-family:"Cinzel",serif;letter-spacing:.22em;font-size:.68rem;color:var(--gold-300);text-transform:uppercase;margin-top:6px}
.s-step{position:absolute;top:52px;right:70px;z-index:5;display:flex;align-items:center;gap:14px}
.s-step .pill{font-family:"Cinzel",serif;letter-spacing:.16em;text-transform:uppercase;font-size:.92rem;color:var(--gold-100);border:1px solid var(--line);border-radius:40px;padding:11px 24px;background:rgba(214,162,62,.06)}
.s-step .pill b{color:#fff;font-family:"Playfair Display",serif;font-weight:700;font-size:1.1rem;letter-spacing:0}
.s-foot{position:absolute;bottom:34px;left:70px;right:70px;z-index:5;display:flex;align-items:flex-end;justify-content:space-between;gap:24px}
.s-foot .brand{font-family:"Cinzel",serif;letter-spacing:.22em;font-size:.74rem;text-transform:uppercase;color:var(--muted)}
.s-foot .legal{font-size:.76rem;line-height:1.5;max-width:920px;text-align:right;color:var(--muted-dim);font-style:italic}

/* main split */
.scene{position:absolute;left:90px;right:90px;top:150px;bottom:150px;display:grid;grid-template-columns:1.12fr .88fr;gap:64px;align-items:center}

/* browser form window */
.win{border-radius:16px;overflow:hidden;border:1px solid rgba(0,0,0,.4);box-shadow:0 44px 90px rgba(0,0,0,.6)}
.win-bar{display:flex;align-items:center;gap:9px;background:#d8dce4;padding:14px 18px}
.win-bar .dot{width:13px;height:13px;border-radius:50%}.win-bar .r{background:#ed6a5e}.win-bar .y{background:#f4c14e}.win-bar .g{background:#61c554}
.win-bar .url{flex:1;margin-left:12px;background:#fff;border-radius:7px;padding:8px 16px;font-size:.92rem;color:#7a8295;display:flex;gap:9px;align-items:center}
.win-bar .url svg{color:#1f9e57;flex:none}
.win-body{background:var(--form-bg);padding:30px 34px 34px;color:#1f2a3d;min-height:520px;max-height:700px;overflow:hidden;position:relative}
.gov{display:flex;align-items:center;gap:14px;padding-bottom:16px;border-bottom:2px solid #b9343b;margin-bottom:22px}
.gov .seal{width:42px;height:42px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#1c4f9c,#0a1f4d);border:2px solid #c9a24a;flex:none;display:flex;align-items:center;justify-content:center;color:#e9c96a;font-size:.8rem}
.gov .a{font-family:"Playfair Display",serif;font-weight:700;font-size:1.18rem;color:#15233c}
.gov .b{font-size:.74rem;letter-spacing:.04em;color:#7a8295;text-transform:uppercase;margin-top:3px}
.fsec{font-family:"Playfair Display",serif;color:#1f3a66;font-weight:700;font-size:1.46rem;margin-bottom:20px}

.fld{margin-bottom:14px;position:relative}
.fld .lb{font-size:1.02rem;font-weight:600;color:#2a3850;margin-bottom:8px;display:block}
.fld .hint{font-size:.82rem;color:#8a93a5;margin-top:5px}
.inp{background:#fff;border:1px solid var(--form-border);border-radius:7px;padding:11px 15px;font-size:1.06rem;color:#33405a;min-height:44px;display:flex;align-items:center}
.inp.hl{background:#fffbe6;border-color:#d8b94a;color:#4a3d12;font-weight:600;box-shadow:0 0 0 4px rgba(214,162,62,.20)}
.inp.pick{justify-content:space-between}
.inp.pick svg{color:#7a8295;flex:none}
.inp.ph{color:#aab1bf}
.inp.area{align-items:flex-start;min-height:78px;line-height:1.4}
.radios{display:flex;gap:26px;align-items:center}
.rd{display:flex;align-items:center;gap:9px;font-size:1.02rem;color:#33405a}
.rd .c{width:18px;height:18px;border-radius:50%;border:2px solid #8a93a5;display:flex;align-items:center;justify-content:center;flex:none}
.rd.on .c{border-color:#0aa6a6;box-shadow:0 0 0 2px rgba(10,166,166,.18)}.rd.on .c::after{content:"";width:8px;height:8px;border-radius:50%;background:#0aa6a6}
.chkrow{display:flex;align-items:center;gap:9px;font-size:.96rem;color:#33405a;margin-top:8px}
.chkbox{width:18px;height:18px;border-radius:4px;border:1.5px solid #8a93a5;display:flex;align-items:center;justify-content:center;flex:none}
.chkbox.on{background:#0aa6a6;border-color:#0aa6a6;color:#fff}
.twocol{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.fbtn{display:inline-flex;align-items:center;gap:9px;background:#b9343b;color:#fff;font-weight:700;font-size:.98rem;padding:13px 24px;border-radius:6px}
.fbtn.save{background:#b9343b}
.fbtn.grey{background:#5b6577}
.idtag{display:inline-flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--form-border);border-radius:8px;padding:13px 20px}
.idtag .lab{font-size:.82rem;color:#7a8295}
.idtag b{font-family:"Playfair Display",serif;color:#b9343b;font-size:1.34rem;letter-spacing:.05em}
.dropdown{margin-top:8px;border:1px solid #d8b94a;border-radius:7px;overflow:hidden;background:#fdfbe9}
.dropdown .opt{padding:9px 15px;font-size:.98rem;color:#3a3a2a;border-bottom:1px solid rgba(0,0,0,.05)}
.dropdown .opt.sel{background:#1c66d6;color:#fff}
.dropdown .opt:last-child{border-bottom:none}
.helpbox{background:#e4e9f1;border-radius:8px;padding:14px 16px;margin-top:6px}
.helpbox .ht{color:#9a3b34;font-family:"Playfair Display",serif;font-weight:700;font-size:1rem;margin-bottom:6px}
.helpbox p{font-size:.86rem;color:#7a8295;line-height:1.45}

/* tip side */
.tip{position:relative;padding-right:10px}
.tip .badge{display:inline-flex;align-items:center;gap:11px;font-family:"Cinzel",serif;letter-spacing:.18em;text-transform:uppercase;font-size:.82rem;font-weight:600;padding:11px 20px;border-radius:40px;margin-bottom:26px}
.tip .badge svg{flex:none}
.badge.dica{color:#2a1c04;background:var(--gold-grad-flat)}
.badge.erro{color:#fff;background:linear-gradient(180deg,#e58479,#b94e44)}
.badge.atencao{color:#2a1c04;background:linear-gradient(180deg,#F4D98A,#D6A23E)}
.badge.check{color:#fff;background:linear-gradient(180deg,#3bc977,#1f9e57)}
.badge.info{color:var(--gold-100);background:rgba(214,162,62,.08);border:1px solid var(--line)}
.tip .num{font-family:"Playfair Display",serif;font-weight:800;font-style:italic;font-size:5.4rem;line-height:.8;background:var(--gold-grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;opacity:.9;margin-bottom:14px}
.tip h2{font-family:"Playfair Display",serif;font-weight:700;font-size:2.7rem;line-height:1.1;margin-bottom:22px;text-wrap:balance}
.tip h2 em{font-style:italic}
.tip p{font-size:1.4rem;line-height:1.56;color:#dce6f8;text-wrap:pretty}
.tip p strong{color:#fff;background:linear-gradient(transparent 60%,rgba(214,162,62,.28) 60%);padding:0 3px}
.tip .scribble{font-family:"Caveat",cursive;color:var(--gold-100);font-size:1.74rem;line-height:1.22;margin-top:26px;padding:16px 22px;border-left:3px solid var(--gold-500);background:rgba(214,162,62,.06);border-radius:0 12px 12px 0}
.tip ul{list-style:none;display:flex;flex-direction:column;gap:13px;margin-top:20px}
.tip ul li{display:flex;gap:13px;align-items:flex-start;font-size:1.2rem;color:var(--ink);line-height:1.45}
.tip ul li .chk{width:26px;height:26px;border-radius:7px;background:rgba(31,158,87,.16);border:1px solid rgba(31,158,87,.5);display:flex;align-items:center;justify-content:center;color:#3bc977;flex:none;margin-top:2px}
.tip .flag{display:inline-flex;align-items:center;gap:10px;margin-top:24px;border:1px solid var(--red);background:rgba(207,106,94,.10);color:#f0c4bd;border-radius:30px;padding:11px 20px;font-size:1.05rem;font-weight:600}
.tip .flag svg{color:var(--red);flex:none}

/* hand-drawn arrow connecting tip to form field */
.arrow{position:absolute;left:-86px;top:50%;width:120px;height:90px;pointer-events:none;color:var(--gold-300)}

/* progress dots */
.progress{position:absolute;left:50%;bottom:88px;transform:translateX(-50%);display:flex;gap:7px;z-index:5;flex-wrap:wrap;max-width:900px;justify-content:center}
.progress i{width:9px;height:9px;border-radius:50%;background:rgba(157,176,214,.22)}
.progress i.on{background:var(--gold-grad-flat);box-shadow:0 0 10px rgba(214,162,62,.55);width:24px;border-radius:5px}
.progress i.done{background:rgba(214,162,62,.42)}

/* intro slide */
.introslide{display:flex;align-items:center;justify-content:center;text-align:center}
.introslide .inner{position:relative;z-index:2;max-width:1300px;padding:0 90px}
.introslide .crest{width:200px;height:200px;display:flex;align-items:center;justify-content:center;margin:0 auto 30px;box-shadow:0 14px 40px rgba(214,162,62,.22)}
.introslide .crest img{width:200px;height:200px;object-fit:contain;filter:drop-shadow(0 12px 30px rgba(214,162,62,.35))}
.introslide .eyebrow{font-family:"Cinzel",serif;letter-spacing:.36em;font-size:.98rem;color:var(--gold-300);text-transform:uppercase;margin-bottom:28px}
.introslide h1{font-family:"Playfair Display",serif;font-weight:800;font-size:5.6rem;line-height:1.04;letter-spacing:-.015em;margin-bottom:26px;text-wrap:balance}
.introslide h1 em{font-style:italic}
.introslide p{font-size:1.42rem;color:var(--muted);max-width:820px;margin:0 auto;line-height:1.55}
.introslide .ornament{display:flex;align-items:center;gap:18px;justify-content:center;margin-top:46px}
.introslide .ornament .ln{height:1px;width:130px;background:linear-gradient(90deg,transparent,var(--gold-500))}
.introslide .ornament .ln.r{background:linear-gradient(270deg,transparent,var(--gold-500))}
.introslide .ornament .dia{width:13px;height:13px;background:var(--gold-grad-flat);transform:rotate(45deg);box-shadow:0 0 16px rgba(214,162,62,.55)}

/* =========================================
   MOTION LAYER — DS-160 vídeo-aula
   Cinético + loops sutis no slide ativo
   ========================================= */
@media (prefers-reduced-motion: no-preference){
  @keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:none}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes fadeScale{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:none}}
  @keyframes slideInL{from{opacity:0;transform:translateX(-34px)}to{opacity:1;transform:none}}
  @keyframes slideInR{from{opacity:0;transform:translateX(34px)}to{opacity:1;transform:none}}
  @keyframes slideInUp{from{opacity:0;transform:translateY(40px) scale(.985)}to{opacity:1;transform:none}}
  @keyframes drawLine{from{transform:scaleX(0)}to{transform:scaleX(1)}}
  @keyframes drawPath{to{stroke-dashoffset:0}}
  @keyframes spinSlow{to{transform:rotate(360deg)}}
  @keyframes diaSpin{0%,100%{transform:rotate(45deg) scale(1);filter:drop-shadow(0 0 14px rgba(214,162,62,.55))}50%{transform:rotate(225deg) scale(1.1);filter:drop-shadow(0 0 22px rgba(214,162,62,.85))}}
  @keyframes hlPulse{0%,100%{box-shadow:0 0 0 4px rgba(214,162,62,.20)}50%{box-shadow:0 0 0 7px rgba(214,162,62,.34), 0 0 22px rgba(214,162,62,.22)}}
  @keyframes caret{0%,49%{opacity:1}50%,100%{opacity:0}}
  @keyframes badgePulse{0%,100%{box-shadow:0 0 0 0 rgba(214,162,62,0)}50%{box-shadow:0 0 0 6px rgba(214,162,62,.18)}}
  @keyframes badgePulseRed{0%,100%{box-shadow:0 0 0 0 rgba(207,106,94,0)}50%{box-shadow:0 0 0 6px rgba(207,106,94,.22)}}
  @keyframes badgePulseGreen{0%,100%{box-shadow:0 0 0 0 rgba(31,158,87,0)}50%{box-shadow:0 0 0 6px rgba(31,158,87,.22)}}
  @keyframes dotPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.4)}}
  @keyframes arrowFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  @keyframes scribbleSlide{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
  @keyframes urlType{from{width:0}to{width:auto}}
  @keyframes barRise{from{transform:scaleX(0);transform-origin:left}to{transform:scaleX(1)}}

  /* ---------- ABERTURA (introslide) ---------- */
  [data-deck-active] .introslide .crest{animation:fadeScale .9s ease-out both, badgePulse 4.6s ease-in-out 1.2s infinite}
  [data-deck-active] .introslide .eyebrow{animation:fadeUp .8s ease-out .25s both}
  [data-deck-active] .introslide h1{animation:fadeUp 1s ease-out .4s both}
  [data-deck-active] .introslide p{animation:fadeUp .9s ease-out .6s both}
  [data-deck-active] .introslide .ornament .ln{transform-origin:right;animation:drawLine .8s ease-out 1s both}
  [data-deck-active] .introslide .ornament .ln.r{transform-origin:left}
  [data-deck-active] .introslide .ornament .dia{animation:fadeIn .4s ease-out 1.45s both, diaSpin 6s ease-in-out 2.2s infinite}

  /* ---------- CHROME comum (header / step / footer) ---------- */
  [data-deck-active] .s-head{animation:fadeIn .55s ease-out both}
  [data-deck-active] .s-step{animation:fadeIn .55s ease-out .12s both}
  [data-deck-active] .s-foot{animation:fadeIn .7s ease-out .8s both}

  /* ---------- JANELA DO NAVEGADOR ---------- */
  [data-deck-active] .win{animation:slideInUp .75s cubic-bezier(.2,.7,.2,1) .1s both}
  [data-deck-active] .win-bar .dot{animation:fadeIn .4s ease-out both}
  [data-deck-active] .win-bar .dot:nth-child(1){animation-delay:.5s}
  [data-deck-active] .win-bar .dot:nth-child(2){animation-delay:.58s}
  [data-deck-active] .win-bar .dot:nth-child(3){animation-delay:.66s}
  [data-deck-active] .win-bar .url{animation:fadeUp .55s ease-out .75s both}
  [data-deck-active] .gov{animation:fadeUp .55s ease-out .55s both}
  [data-deck-active] .gov .seal{animation:fadeScale .6s ease-out .6s both, badgePulse 4s ease-in-out 2s infinite}
  [data-deck-active] .fsec{animation:fadeUp .5s ease-out .7s both;position:relative}
  [data-deck-active] .fsec::after{content:"";position:absolute;left:0;right:0;bottom:-2px;height:2px;background:#b9343b;transform-origin:left;animation:drawLine .7s ease-out .85s both}

  /* ---------- CAMPOS DO FORMULÁRIO em cascata ---------- */
  [data-deck-active] .win-body .fld{animation:fadeUp .5s ease-out both;animation-delay:calc(.85s + var(--fi,0)*.07s)}
  [data-deck-active] .win-body .fld:nth-child(1){--fi:0}
  [data-deck-active] .win-body .fld:nth-child(2){--fi:1}
  [data-deck-active] .win-body .fld:nth-child(3){--fi:2}
  [data-deck-active] .win-body .fld:nth-child(4){--fi:3}
  [data-deck-active] .win-body .fld:nth-child(5){--fi:4}
  [data-deck-active] .win-body .fld:nth-child(6){--fi:5}
  [data-deck-active] .win-body .fld:nth-child(7){--fi:6}
  [data-deck-active] .win-body .fld:nth-child(8){--fi:7}
  [data-deck-active] .win-body .fld:nth-child(9){--fi:8}
  [data-deck-active] .win-body .fld:nth-child(10){--fi:9}
  [data-deck-active] .win-body .fld:nth-child(11){--fi:10}
  [data-deck-active] .win-body .fld:nth-child(12){--fi:11}

  /* ---------- CAMPO DESTACADO — loop de atenção ---------- */
  [data-deck-active] .inp.hl{animation:hlPulse 2.6s ease-in-out 1.4s infinite}
  [data-deck-active] .inp.hl::after{content:"";display:inline-block;width:2px;height:1.1em;background:#a9781f;margin-left:4px;animation:caret 1s steps(1) infinite}
  [data-deck-active] .inp.pick.hl::after{display:none}

  /* ---------- SETA DESENHADA À MÃO ---------- */
  [data-deck-active] .arrow{animation:fadeIn .5s ease-out 1.4s both, arrowFloat 2.6s ease-in-out 2s infinite}
  [data-deck-active] .arrow svg path{stroke-dasharray:280;stroke-dashoffset:280;animation:drawPath 1.1s cubic-bezier(.6,.1,.3,1) 1.5s forwards}
  [data-deck-active] .arrow svg polyline,[data-deck-active] .arrow svg line{animation:fadeIn .4s ease-out 2.5s both}

  /* ---------- CARD LATERAL (tip) ---------- */
  [data-deck-active] .tip{animation:slideInR .8s cubic-bezier(.2,.7,.2,1) .3s both}
  [data-deck-active] .tip .badge{animation:fadeUp .5s ease-out .6s both, badgePulse 3.6s ease-in-out 1.6s infinite}
  [data-deck-active] .tip .badge.erro{animation:fadeUp .5s ease-out .6s both, badgePulseRed 3.6s ease-in-out 1.6s infinite}
  [data-deck-active] .tip .badge.check{animation:fadeUp .5s ease-out .6s both, badgePulseGreen 3.6s ease-in-out 1.6s infinite}
  [data-deck-active] .tip .num{animation:fadeUp .55s ease-out .7s both}
  [data-deck-active] .tip h3{animation:fadeUp .6s ease-out .8s both}
  [data-deck-active] .tip p{animation:fadeUp .55s ease-out .95s both}
  [data-deck-active] .tip ul li{animation:fadeUp .45s ease-out both;animation-delay:calc(1.05s + var(--li,0)*.08s)}
  [data-deck-active] .tip ul li:nth-child(1){--li:0}
  [data-deck-active] .tip ul li:nth-child(2){--li:1}
  [data-deck-active] .tip ul li:nth-child(3){--li:2}
  [data-deck-active] .tip ul li:nth-child(4){--li:3}
  [data-deck-active] .tip .scribble{animation:scribbleSlide .7s cubic-bezier(.2,.7,.2,1) 1.35s both}
  [data-deck-active] .tip .helpbox{animation:fadeUp .55s ease-out 1.15s both}

  /* ---------- PROGRESS DOTS ---------- */
  [data-deck-active] .progress{animation:fadeIn .8s ease-out .9s both}
  [data-deck-active] .progress i.on{animation:dotPulse 2.2s ease-in-out infinite}

  /* dropdown e idtag herdam o stagger via .fld */
  [data-deck-active] .dropdown{animation:slideInUp .55s ease-out .95s both}
  [data-deck-active] .dropdown .opt{animation:fadeIn .35s ease-out both}
  [data-deck-active] .dropdown .opt:nth-child(1){animation-delay:1.05s}
  [data-deck-active] .dropdown .opt:nth-child(2){animation-delay:1.13s}
  [data-deck-active] .dropdown .opt:nth-child(3){animation-delay:1.21s}
  [data-deck-active] .dropdown .opt:nth-child(4){animation-delay:1.29s}
  [data-deck-active] .dropdown .opt:nth-child(5){animation-delay:1.37s}
}
</style>
</head>
<body>
<deck-stage width="1920" height="1080"></deck-stage>

<script>
const TOTAL_LABEL = "Telas do formulário";

/* ---- field builders ---- */
function field(lb,inner,opt={}){return `<div class="fld">${lb?`<span class="lb">${lb}</span>`:''}${inner}${opt.hint?`<span class="hint">${opt.hint}</span>`:''}</div>`;}
function inp(v,o={}){return field(o.lb,`<div class="inp ${o.hl?'hl':''} ${o.ph?'ph':''}">${v}</div>`,o);}
function pick(v,o={}){return field(o.lb,`<div class="inp pick ${o.hl?'hl':''}">${v}${chev}</div>`,o);}
function radio(lb,v,o={}){return field(lb,`<div class="radios"><span class="rd ${v==='Sim'?'on':''}"><span class="c"></span>Sim</span><span class="rd ${v==='Não'?'on':''}"><span class="c"></span>Não</span></div>`,o);}
function area(lb,v,o={}){return field(lb,`<div class="inp area ${o.hl?'hl':''}">${v}</div>`,o);}
function btn(v,o={}){return field(o.lb,`<div class="fbtn ${o.cls||''}">${v}</div>`,o);}
function idtag(v){return field('',`<div class="idtag"><span class="lab">Application ID</span><b>${v}</b></div>`);}
function chk(lb,on){return `<div class="chkrow"><span class="chkbox ${on?'on':''}">${on?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12l5 5L20 7"/></svg>':''}</span>${lb}</div>`;}
function drop(opts,o={}){return field(o.lb,`<div class="inp pick ${o.hl?'hl':''}">${opts[o.sel||0]}${chev}</div><div class="dropdown">${opts.map((t,i)=>`<div class="opt ${i===(o.sel||0)?'sel':''}">${t}</div>`).join('')}</div>`,o);}
function help(title,body){return `<div class="helpbox"><div class="ht">${title}</div><p>${body}</p></div>`;}

/* ---- render scenes into deck-stage ---- */
function legalText(full){return full
  ? "Conteúdo educativo e orientativo. Sempre confira as informações oficiais nos canais do governo americano e no portal de agendamento vigente no Brasil."

const stage=document.querySelector('deck-stage');
let html='';

/* intro */
html+=`<section data-label="Abertura">

    <div class="inner">
      <div class="crest"><img src="assets/globo-logo.png" alt=""></div>
      <div class="eyebrow">Módulo 01 · Formulário DS-160</div>
      <h1>O formulário, <em class="gold-text">tela por tela</em></h1>
      <p>Vamos percorrer cada página oficial do DS-160 — o que preencher, o cuidado em cada campo e como avançar com segurança.</p>
      <div class="ornament"><span class="ln"></span><span class="dia"></span><span class="ln r"></span></div>
    </div>
    <div class="s-foot"><div class="brand">Descomplica Visto · Assessoria Consular</div><div class="legal">${legalText(true)}</div></div>
  </div>
</section>`;

S.forEach((s,i)=>{

  const dots=S.map((_,k)=>`<i class="${k<i?'done':(k===i?'on':'')}"></i>`).join('');
  html+=`<section data-label="${(n<10?'0':'')+n} ${s.sec}">
   <div class="slide">
     <span class="dots"></span>
     <div class="s-head"><img class="logo" src="assets/globo-logo.png" alt=""><div><div class="a">Descomplica Visto</div><div class="b">Assessoria Consular</div></div></div>
     <div class="s-step"><span class="pill">Tela <b>${(n<10?'0':'')+n}</b> / ${S.length}</span></div>
     <div class="scene">
       <div class="win">
         <div class="win-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="url">${lock} ${s.url}</span></div>

         </div>
       </div>

         <div class="badge ${s.kind}">${badgeIcon[s.kind]} ${badgeLabel[s.kind]}</div>
         <div class="num">${(n<10?'0':'')+n}</div>
         <h2>${s.h}</h2>
         <p>${s.tip}</p>

     </div>
     <div class="progress">${dots}</div>
     <div class="s-foot"><div class="brand">Descomplica Visto · Assessoria Consular</div><div class="legal">${legalText(s.kind==='atencao')}</div></div>

});

stage.innerHTML=html;

/* load deck-stage after children exist */
const sc=document.createElement('script');
sc.src='deck-stage.js';
document.body.appendChild(sc);
