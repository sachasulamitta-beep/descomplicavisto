<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<script src="access.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Módulo 3 — Agendamento da Entrevista | Descomplica Visto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;1,500;1,600&family=Cinzel:wght@500;600;700&family=Hanken+Grotesk:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --navy-950:#040A18;--navy-900:#06112A;--navy-800:#091a3d;--navy-700:#0c2350;--navy-600:#123067;
  --royal:#1c4f9c;--gold-50:#FCEFC0;--gold-100:#F7E2A0;--gold-300:#EBC56A;--gold-500:#D6A23E;--gold-700:#A9781F;
  --ink:#ECF2FE;--muted:#9DB0D6;--muted-dim:#6F82A8;--line:rgba(214,162,62,.30);--line-soft:rgba(157,176,214,.16);
  --green:#1f9e57;--red:#cf6a5e;
  --form-bg:#eef1f6;--form-ink:#1f2a3d;--form-field:#fff;--form-border:#c4ccd8;
  --casv:#3b3f8f;--casv-d:#2a2d6b;
  --gold-grad:linear-gradient(174deg,#FCEFC0 0%,#F0CE78 30%,#D6A23E 58%,#A9781F 100%);
  --gold-grad-flat:linear-gradient(180deg,#F4D98A 0%,#D6A23E 60%,#B0801F 100%);
  --sb:300px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:"Hanken Grotesk",system-ui,sans-serif;background:var(--navy-950);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.6;}
a{color:inherit;text-decoration:none}
.serif{font-family:"Playfair Display",Georgia,serif;}
.gold{background:var(--gold-grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}

.topbar{position:fixed;top:0;left:0;right:0;height:64px;z-index:90;display:flex;align-items:center;justify-content:space-between;
  padding:0 22px;background:rgba(6,17,42,.86);backdrop-filter:blur(14px);border-bottom:1px solid var(--line-soft);}
.topbar .l{display:flex;align-items:center;gap:13px;min-width:0;}
.topbar .burger{display:none;background:none;border:none;color:var(--ink);cursor:pointer;padding:4px;}
.topbar .logo{height:38px;width:38px;object-fit:contain;}
.topbar .tt{line-height:1.1;min-width:0;}
.topbar .tt .a{font-family:"Playfair Display",serif;font-weight:700;font-size:.98rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.topbar .tt .b{font-family:"Cinzel",serif;letter-spacing:.18em;font-size:.52rem;color:var(--gold-300);text-transform:uppercase;margin-top:3px;}
.topbar .r{display:flex;align-items:center;gap:14px;flex:none;}
.tips-toggle{display:inline-flex;align-items:center;gap:9px;font-size:.82rem;font-weight:600;color:var(--gold-100);border:1px solid var(--line);border-radius:30px;padding:8px 14px;cursor:pointer;background:rgba(214,162,62,.05);transition:.2s;}
.tips-toggle:hover{background:rgba(214,162,62,.12);}
.tips-toggle .sw{width:30px;height:17px;border-radius:20px;background:rgba(157,176,214,.25);position:relative;transition:.2s;flex:none;}
.tips-toggle .sw::after{content:"";position:absolute;top:2px;left:2px;width:13px;height:13px;border-radius:50%;background:#fff;transition:.2s;}
.tips-toggle.on .sw{background:var(--gold-grad-flat);}.tips-toggle.on .sw::after{left:15px;}

.shell{display:flex;padding-top:64px;}
.sidebar{position:fixed;top:64px;bottom:0;left:0;width:var(--sb);overflow-y:auto;border-right:1px solid var(--line-soft);
  background:linear-gradient(180deg,rgba(9,26,61,.5),rgba(6,17,42,.4));padding:24px 16px 60px;z-index:80;
  scrollbar-width:thin;scrollbar-color:var(--gold-700) transparent;}
.sidebar::-webkit-scrollbar{width:6px}.sidebar::-webkit-scrollbar-thumb{background:var(--gold-700);border-radius:10px}
.sb-label{font-family:"Cinzel",serif;letter-spacing:.2em;font-size:.6rem;color:var(--gold-300);text-transform:uppercase;margin:0 0 14px 8px;}
.nav-step{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:11px;cursor:pointer;transition:background .18s;margin-bottom:2px;}
.nav-step:hover{background:rgba(214,162,62,.06)}.nav-step.active{background:rgba(214,162,62,.1);}
.nav-step .n{width:24px;height:24px;border-radius:50%;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-family:"Cinzel",serif;font-size:.68rem;color:var(--gold-300);flex:none;}
.nav-step.active .n{background:var(--gold-grad-flat);color:var(--navy-900);border-color:transparent;font-weight:700;}
.nav-step.done .n{background:rgba(31,158,87,.18);border-color:var(--green);color:#7fe0a6;}
.nav-step .t{font-size:.86rem;font-weight:500;color:var(--muted);}.nav-step.active .t{color:var(--ink);font-weight:600;}
.scrim{display:none;}

.main{margin-left:var(--sb);flex:1;min-width:0;display:flex;justify-content:center;padding:34px 30px 120px;}
.stage{width:100%;max-width:780px;}
.crumb{font-family:"Cinzel",serif;letter-spacing:.16em;font-size:.66rem;color:var(--gold-300);text-transform:uppercase;}
.scr-title{font-family:"Playfair Display",serif;font-weight:700;font-size:clamp(1.7rem,3.6vw,2.3rem);line-height:1.12;margin:10px 0 6px;text-wrap:balance;}
.scr-intro{color:var(--muted);font-size:1.04rem;margin-bottom:8px;}
.scr-count{display:inline-flex;align-items:center;gap:8px;font-size:.8rem;color:var(--muted-dim);margin-top:6px;}

.win{margin-top:26px;border-radius:14px;overflow:hidden;border:1px solid rgba(0,0,0,.3);box-shadow:0 30px 70px rgba(0,0,0,.5);}
.win-bar{display:flex;align-items:center;gap:8px;background:#d8dce4;padding:10px 14px;border-bottom:1px solid #b9c0cc;}
.win-bar .dot{width:11px;height:11px;border-radius:50%;}
.win-bar .r{background:#ed6a5e}.win-bar .y{background:#f4c14e}.win-bar .g{background:#61c554}
.win-bar .url{flex:1;margin-left:10px;background:#fff;border-radius:6px;padding:5px 12px;font-size:.74rem;color:#7a8295;display:flex;align-items:center;gap:7px;overflow:hidden;}
.win-bar .url svg{flex:none;color:#1f9e57}
.win-body{background:var(--form-bg);padding:0 0 30px;color:var(--form-ink);}
.casv-head{background:linear-gradient(180deg,var(--casv),var(--casv-d));padding:16px 26px;display:flex;align-items:center;gap:12px;}
.casv-head .seal{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.12);border:1.5px solid #b9c0e8;flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.66rem;}
.casv-head .ht .a{font-weight:700;font-size:.96rem;color:#fff;}
.casv-head .ht .b{font-size:.62rem;letter-spacing:.06em;color:#c3c6ee;text-transform:uppercase;margin-top:2px;}
.win-pad{padding:24px 26px 0;}
.casv-sec{font-family:"Playfair Display",serif;color:#2a2d6b;font-weight:700;font-size:1.15rem;margin:0 0 4px;}

.field{padding:14px 0;border-bottom:1px dashed #cdd4df;position:relative;}
.field:last-child{border-bottom:none}
.field .flabel{display:block;font-size:.92rem;font-weight:600;color:#2a3850;margin-bottom:7px;}
.inp{width:100%;max-width:420px;background:var(--form-field);border:1px solid var(--form-border);border-radius:6px;padding:9px 12px;font-size:.92rem;color:#33405a;}
.inp[data-ph]{color:#aab2c2}
.sel{width:100%;max-width:420px;background:var(--form-field);border:1px solid var(--form-border);border-radius:6px;padding:9px 12px;font-size:.92rem;color:#33405a;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.sel.val{background:#eef0fb;border-color:#9aa0d8;color:#2a2d6b;font-weight:600;}
.sel svg{flex:none;color:#7a8295}
.greenbtn{display:inline-flex;align-items:center;gap:8px;background:#2e9e54;color:#fff;font-weight:700;font-size:.84rem;padding:10px 20px;border-radius:5px;}
.addr{background:#fff;border:1px solid var(--form-border);border-radius:8px;padding:13px 16px;font-size:.86rem;color:#46506a;max-width:420px;line-height:1.5;}
.addr b{color:#2a2d6b}
.statusbar{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--form-border);border-left:4px solid var(--green);border-radius:8px;padding:13px 16px;max-width:460px;}
.statusbar .ic{width:26px;height:26px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;flex:none;}
.statusbar .t{font-weight:700;color:#1f6b3f;font-size:.94rem;}
.cal{background:#fff;border:1px solid var(--form-border);border-radius:8px;padding:14px;max-width:340px;}
.cal .ch{display:flex;justify-content:space-between;align-items:center;font-weight:700;color:#2a2d6b;font-size:.82rem;margin-bottom:10px;}
.cal .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal .d{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:.74rem;border-radius:5px;color:#9aa3b5;}
.cal .d.av{background:#dfe6fb;color:#2a2d6b;font-weight:700;}
.cal .d.sel{background:var(--casv);color:#fff;font-weight:700;}
.cal .d.wd{color:#7a8295;font-size:.64rem;font-weight:600;}
.deliv{display:flex;gap:14px;align-items:center;background:#fff;border:1px solid var(--form-border);border-radius:8px;padding:14px 16px;max-width:460px;}
.deliv .ic{width:44px;height:44px;border-radius:9px;background:#eef0fb;display:flex;align-items:center;justify-content:center;color:var(--casv);flex:none;}
.deliv .t{font-weight:700;color:#2a3850;font-size:.92rem;}
.deliv .s{font-size:.82rem;color:#7a8295;margin-top:2px;}
.deliv .pr{margin-left:auto;font-family:"Playfair Display",serif;font-weight:700;color:#2a2d6b;}
.doclist{background:#fff;border:1px solid var(--form-border);border-radius:8px;padding:6px 8px;max-width:520px;}
.doclist .di{display:flex;gap:11px;align-items:flex-start;padding:10px 10px;border-bottom:1px solid #eef0f4;font-size:.88rem;color:#33405a;}
.doclist .di:last-child{border-bottom:none}
.doclist .di .ck{width:20px;height:20px;border-radius:5px;background:#dff3e6;border:1px solid #8fd3a8;color:#1f9e57;display:flex;align-items:center;justify-content:center;flex:none;font-size:.7rem;}
.doclist .di b{color:#1f2a3d}
.help{margin-top:8px;background:#eef0fb;border-left:3px solid var(--casv);padding:8px 12px;border-radius:0 6px 6px 0;font-size:.8rem;color:#3a3d6e;max-width:480px;}

.tipdot{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--gold-grad-flat);color:var(--navy-900);font-weight:800;font-size:.78rem;cursor:pointer;margin-left:8px;vertical-align:middle;box-shadow:0 3px 9px rgba(214,162,62,.4);flex:none;animation:pulse 2.4s infinite;border:none;}
@keyframes pulse{0%,100%{box-shadow:0 3px 9px rgba(214,162,62,.4)}50%{box-shadow:0 3px 16px rgba(214,162,62,.7)}}
.flabel-row{display:flex;align-items:center;flex-wrap:wrap;gap:4px;}
.tip{margin-top:12px;border-radius:12px;padding:0;max-height:0;overflow:hidden;transition:max-height .3s ease,padding .3s ease;background:linear-gradient(180deg,#0c2350,#08182f);border:1px solid var(--gold-500);}
.tip.open,.tips-all .tip{max-height:380px;padding:15px 18px;}
.tip .th{display:flex;align-items:center;gap:9px;font-family:"Cinzel",serif;letter-spacing:.1em;font-size:.66rem;text-transform:uppercase;color:var(--gold-300);margin-bottom:7px;}
.tip .th .av{width:22px;height:22px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#3a7bd5,#0c2350);border:1px solid var(--gold-500);display:flex;align-items:center;justify-content:center;font-family:"Playfair Display",serif;font-size:.6rem;color:var(--gold-100);flex:none;}
.tip p{color:#e7eefb;font-size:.92rem;line-height:1.55;}.tip p strong{color:#fff}
.tip.warn{border-color:var(--red)}.tip.warn .th{color:#ec9a8e}

.scrnav{display:flex;gap:14px;margin-top:34px;}
.scrnav button{flex:1;border:1px solid var(--line);border-radius:13px;padding:16px 20px;background:rgba(9,26,61,.4);cursor:pointer;color:var(--ink);text-align:left;transition:.2s;font-family:inherit;}
.scrnav button:hover:not(:disabled){border-color:var(--gold-500);background:rgba(214,162,62,.06);transform:translateY(-2px)}
.scrnav button:disabled{opacity:.35;cursor:default}
.scrnav .dir{font-family:"Cinzel",serif;font-size:.6rem;letter-spacing:.16em;color:var(--gold-300);text-transform:uppercase;}
.scrnav .ti{font-family:"Playfair Display",serif;font-weight:600;font-size:1rem;margin-top:5px;}.scrnav .next{text-align:right}
.intro-note{display:flex;gap:12px;align-items:flex-start;margin-top:18px;border:1px solid var(--line);border-radius:13px;padding:16px 18px;background:rgba(214,162,62,.05);color:var(--muted);font-size:.92rem;}
.intro-note svg{flex:none;color:var(--gold-300);margin-top:2px}.intro-note b{color:var(--ink)}

/* final celebration */
.finale{margin-top:30px;border:1px solid var(--gold-500);border-radius:18px;padding:36px 30px;text-align:center;background:radial-gradient(80% 100% at 50% 0%,rgba(28,79,156,.3),transparent 60%),linear-gradient(180deg,#0b2050,#06112a);}
.finale .seal{width:78px;height:78px;margin:0 auto 16px;border-radius:50%;border:3px solid var(--gold-500);display:flex;align-items:center;justify-content:center;color:var(--gold-300);box-shadow:0 0 28px rgba(214,162,62,.3),inset 0 0 16px rgba(214,162,62,.14);}
.finale h3{font-family:"Playfair Display",serif;font-weight:800;font-size:1.6rem;}
.finale p{color:var(--muted);margin-top:10px;font-size:1rem;}
.finale a{display:inline-flex;align-items:center;gap:9px;margin-top:22px;font-weight:700;color:var(--navy-900);background:var(--gold-grad-flat);padding:13px 24px;border-radius:11px;}

@media(max-width:980px){
  :root{--sb:0px}
  .sidebar{transform:translateX(-100%);transition:transform .3s ease;width:300px;}
  .sidebar.open{transform:none}.topbar .burger{display:block}
  .main{margin-left:0;padding:26px 18px 90px}
  .scrim.show{display:block;position:fixed;inset:64px 0 0;background:rgba(4,10,24,.6);z-index:70}
  .tips-toggle span.lbl{display:none}
}
</style>
</head>
<body>

<header class="topbar">
  <div class="l">
    <button class="burger" id="burger" aria-label="Menu"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
    <img class="logo" src="assets/globo-logo.png" alt="Descomplica Visto">
    <div class="tt"><div class="a">Módulo 3 — Agendamento</div><div class="b">Descomplica Visto</div></div>
  </div>
  <div class="r"><div class="tips-toggle on" id="tipsToggle"><span class="sw"></span><span class="lbl">Dicas da Isis</span></div></div>
</header>

<div class="shell">
  <aside class="sidebar" id="sidebar"><div class="sb-label">Etapas do agendamento</div><div id="navList"></div></aside>
  <div class="scrim" id="scrim"></div>
  <main class="main"><div class="stage" id="stage"></div></main>
</div>

<script>
const AV="IS";
const SCREENS=[
 {sec:"Realizar agendamento", titulo:"Iniciar o agendamento", url:"ais.usvisa-info.com · Status",
  intro:"Com a taxa paga, o calendário foi liberado. Agora você marca a data da entrevista no consulado.",
  campos:[
   {tipo:"green", label:"Realizar Agendamento",
    dica:"Clique em <strong>'Realizar Agendamento'</strong> para escolher o local, a data e o horário da sua entrevista consular."}
  ]},

 {sec:"Local e data", titulo:"Escolher posto, data e horário", url:"ais.usvisa-info.com · Agendamento",
  intro:"Selecione o posto consular e a data. Atenção: o posto precisa ser o mesmo do seu DS-160.",
  campos:[
   {tipo:"select", label:"Local da Seção Consular", val:"Recife",
    warn:true, dica:"O posto consular do agendamento <strong>tem que ser o mesmo informado no formulário DS-160</strong>. Se for diferente, não funciona."},
   {tipo:"addr", label:"Endereço da Seção Consular"},
   {tipo:"cal", label:"Data do agendamento",
    dica:"As <strong>datas em azul destacadas são as disponíveis</strong>. Escolha uma delas e depois selecione o horário."},
   {tipo:"select", label:"Horário do agendamento", val:"07:45"}
  ]},

 {sec:"Agendamento confirmado", titulo:"Entrevista agendada com sucesso", url:"ais.usvisa-info.com · Confirmação",
  intro:"Você agendou a entrevista. Agora decida como vai receber o passaporte de volta.",
  campos:[
   {tipo:"status", label:"Você agendou com êxito sua entrevista de visto"},
   {tipo:"info", label:"Retirada da documentação",
    dica:"O serviço padrão de retirada da documentação está incluído sem cobrança. Você <strong>retira o passaporte num CASV</strong> após a aprovação."}
  ]},

 {sec:"Entrega Premium", titulo:"Receber o passaporte em casa (opcional)", url:"ais.usvisa-info.com · Entrega Premium",
  intro:"Se preferir não buscar pessoalmente, há a opção de entrega em casa pelos Correios, por uma taxa.",
  campos:[
   {tipo:"deliv", label:"Serviço de Entrega Premium", pr:"66,00 BRL",
    dica:"Você pode escolher como terá acesso ao passaporte. <strong>Pelos Correios, paga-se a taxa para receber na sua residência</strong> (≈ R$66 por pessoa). O pagamento é <strong>somente no cartão de crédito</strong>."},
   {tipo:"text", label:"Aos cuidados de", val:"NOME DO SOLICITANTE",
    dica:"Preencha <strong>'Aos cuidados de'</strong> com o nome do solicitante <strong>igual está no RG</strong>. Documentos não são entregues fora do Brasil."}
  ]},

 {sec:"Gerar o PDF", titulo:"Comparecer ao agendamento e gerar o PDF", url:"ais.usvisa-info.com · Instruções",
  intro:"Falta pouco: gere e imprima as instruções do agendamento. Você vai levar isso à entrevista.",
  campos:[
   {tipo:"status2", label:"Status: Comparecer ao Agendamento"},
   {tipo:"green", label:"Imprimir instruções",
    dica:"Após finalizar o agendamento, é necessário <strong>gerar o PDF</strong> em 'Imprimir instruções'. Essa página de confirmação você leva impressa no dia da entrevista."}
  ]},

 {sec:"Documentos", titulo:"Documentos para levar à entrevista", url:"ais.usvisa-info.com · Documentação",
  intro:"A lista do que levar no dia. Confira tudo com antecedência para não ter surpresas.",
  campos:[
   {tipo:"docs", label:"Documentação geral (todos os tipos de visto)"},
   {tipo:"info", label:"Observação importante",
    dica:"Em <strong>Porto Alegre e Recife</strong> é obrigatório levar uma <strong>foto impressa 5x5 cm</strong>, colorida, tirada nos últimos 6 meses, com fundo branco. Menores de 14 anos ou maiores de 80 não precisam comparecer ao CASV."}
  ],
  nota:"Você pode <b>reagendar até 3 dias úteis antes</b> da entrevista. Se a opção de reagendar não aparecer, é porque não é mais elegível.",
  finale:true}
];

const stage=document.getElementById('stage');
const navList=document.getElementById('navList');
let cur=0;
const DONE_KEY='descomplica_m3_seen';
let seen=JSON.parse(localStorage.getItem(DONE_KEY)||'{}');

function calHTML(){
  const wd=['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div class="d wd">${d}</div>`).join('');
  const av=[1,8,11,12,15,18,22,23,25,26,29];const sel=14;
  let days='';for(let d=1;d<=31;d++){const c=d===sel?'sel':(av.includes(d)?'av':'');days+=`<div class="d ${c}">${d}</div>`;}
  return `<div class="cal"><div class="ch"><span>‹</span><span>Maio 2026</span><span>›</span></div><div class="grid">${wd}${days}</div></div>`;
}
function ctrl(f){
  if(f.tipo==='text') return `<div class="inp" ${f.val?'':'data-ph'}>${f.val||f.ph||''}</div>`;
  if(f.tipo==='select') return `<div class="sel ${f.val&&!f.val.startsWith('-')?'val':''}">${f.val}<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></div>`;
  if(f.tipo==='green') return `<div class="greenbtn">${f.label}</div>`;
  if(f.tipo==='addr') return `<div class="addr"><b>Endereço da Seção Consular</b><br>Rua Gonçalves Maia, 163<br>Bairro Boa Vista · Recife - PE · CEP 50.070-060<br>Brasil</div>`;
  if(f.tipo==='cal') return calHTML();
  if(f.tipo==='status') return `<div class="statusbar"><span class="ic"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12l5 5L20 6"/></svg></span><span class="t">Agendamento realizado · 14 Mai 2026, 07:45 · Recife</span></div>`;
  if(f.tipo==='status2') return `<div class="statusbar"><span class="ic"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12l5 5L20 6"/></svg></span><span class="t">Comparecer ao Agendamento</span></div>`;
  if(f.tipo==='deliv') return `<div class="deliv"><span class="ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 9h13v8H3zM16 12h4l1 3v2h-5z"/><circle cx="7" cy="18" r="1.6"/><circle cx="18" cy="18" r="1.6"/></svg></span><div><div class="t">Entrega Premium (Correios)</div><div class="s">Receber o passaporte em casa</div></div><span class="pr">${f.pr}</span></div>`;
  if(f.tipo==='docs'){
    const items=[
      '<b>Passaporte atual válido</b> — pelo menos 6 meses além da estadia prevista.',
      '<b>Comprovante da taxa consular (MRV) paga</b>.',
      'Passaporte com o <b>último visto dos EUA</b>, se aplicável. <em>Se for renovação de visto, leve o passaporte anterior onde está o visto antigo.</em>',
      'Página de confirmação do <b>Formulário DS-160</b>.',
      'Página de confirmação e <b>instruções do agendamento</b> (impressa).',
      '<b>Recife / Porto Alegre:</b> foto impressa 5x5 cm, fundo branco.'
    ];
    return `<div class="doclist">${items.map(t=>`<div class="di"><span class="ck"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12l5 5L20 6"/></svg></span><span>${t}</span></div>`).join('')}</div>`;
  }
  return '';
}
function fieldHTML(f,i){
  const showLabel = !['green','addr','cal','status','status2','deliv','docs'].includes(f.tipo) || f.tipo==='cal'||f.tipo==='select'||f.tipo==='text';
  const label = (f.tipo==='green')?'':`<div class="flabel-row"><span class="flabel">${f.label}</span>${f.dica?`<button class="tipdot" data-i="${i}">i</button>`:''}</div>`;
  const control = f.tipo==='info' ? '' : ctrl(f);
  const isBtnLike=['green'].includes(f.tipo);
  const btnTip = (isBtnLike&&f.dica)?`<button class="tipdot" data-i="${i}" style="margin-left:10px">i</button>`:'';
  const tip = f.dica?`<div class="tip ${f.warn?'warn':''}" data-tip="${i}"><div class="th"><span class="av">${AV}</span> ${f.warn?'Atenção — Dica da Isis':'Dica da Isis'}</div><p>${f.dica}</p></div>`:'';
  return `<div class="field">${label}<div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px">${control}${btnTip}</div>${tip}</div>`;
}
function render(){
  const s=SCREENS[cur];
  seen[cur]=true;localStorage.setItem(DONE_KEY,JSON.stringify(seen));
  stage.innerHTML=`
    <div class="crumb">Módulo 3 · ${s.sec}</div>
    <h1 class="scr-title">${s.titulo}</h1>

    ${s.nota?`<div class="intro-note"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg><span>${s.nota}</span></div>`:''}

      <div class="win-body">
        <div class="casv-head"><span class="seal">US</span><div class="ht"><div class="a">U.S. Visa Information & Appointment Services</div><div class="b">CASV · Agendamento da Entrevista</div></div></div>
        <div class="win-pad"><div class="casv-sec">${s.titulo}</div>${s.campos.map((f,i)=>fieldHTML(f,i)).join('')}</div>
      </div>
    </div>
    ${s.finale?`<div class="finale"><div class="seal"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 3l8 3v6c0 5-3.5 8-8 9-4.5-1-8-4-8-9V6z"/><path d="M9 12l2 2 4-4"/></svg></div><h3 class="serif">Processo completo!</h3><p>Você agora conhece todo o caminho: DS-160, taxa consular e agendamento. O próximo passo é o <b style="color:var(--gold-100)">treinamento de entrevista</b> — e, se quiser acompanhamento individual, a Isis está a uma mensagem de distância.</p><a href="https://wa.me/5584999185400?text=Conclu%C3%AD%20o%20guia%20e%20quero%20o%20treinamento%20de%20entrevista%20com%20a%20especialista." target="_blank" rel="noopener">Falar com a especialista</a></div>`:''}
    <div class="scrnav">
      <button ${cur===0?'disabled':''} onclick="go(${cur-1})"><div class="dir">← Anterior</div><div class="ti">${cur>0?SCREENS[cur-1].sec:'—'}</div></button>
      <button class="next" ${cur===SCREENS.length-1?'disabled':''} onclick="go(${cur+1})"><div class="dir">Próximo →</div><div class="ti">${cur<SCREENS.length-1?SCREENS[cur+1].sec:'—'}</div></button>
    </div>`;
  stage.querySelectorAll('.tipdot').forEach(b=>{b.onclick=()=>{const t=stage.querySelector(`.tip[data-tip="${b.dataset.i}"]`);if(t)t.classList.toggle('open');};});
  buildNav();window.scrollTo({top:0,behavior:'smooth'});
}
function go(i){if(i<0||i>=SCREENS.length)return;cur=i;render();if(innerWidth<=980){sidebar.classList.remove('open');scrim.classList.remove('show');}}
window.go=go;
function buildNav(){navList.innerHTML=SCREENS.map((s,i)=>`<div class="nav-step ${i===cur?'active':''} ${seen[i]&&i!==cur?'done':''}" onclick="go(${i})"><span class="n">${i+1}</span><span class="t">${s.sec}</span></div>`).join('');}
const tipsToggle=document.getElementById('tipsToggle');
tipsToggle.onclick=()=>{tipsToggle.classList.toggle('on');document.body.classList.toggle('tips-all',tipsToggle.classList.contains('on'));};
document.body.classList.add('tips-all');
const sidebar=document.getElementById('sidebar'),scrim=document.getElementById('scrim');
document.getElementById('burger').onclick=()=>{sidebar.classList.toggle('open');scrim.classList.toggle('show');};
scrim.onclick=()=>{sidebar.classList.remove('open');scrim.classList.remove('show');};
render();
</script>
