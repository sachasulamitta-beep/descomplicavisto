  .sgA-btn{margin-top:15px;align-self:flex-start;display:inline-flex;align-items:center;gap:10px;white-space:nowrap;background:linear-gradient(180deg,#23b85c,#16894a);color:#fff;font-weight:700;font-size:15px;padding:12px 22px;border-radius:11px;box-shadow:0 12px 28px rgba(31,158,87,.32);}
